<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Watch</title>
  <meta name="description" content="Daily market briefs: macro, stocks, options, crypto. Not investment advice.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- PWA: Chrome / Android install prompt -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#14110a">

  <!-- iOS Safari "Add to Home Screen" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Market Watch">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
  <div class="mw-page" id="root">
    <p class="mw-empty">Loading the latest brief.</p>
  </div>

<script>
"use strict";

// ============================================================
//  GLOSSARY
// ============================================================
const GLOSSARY = {
  "RSI": "Relative Strength Index. Above 70 is stretched, below 30 is oversold. A momentum gauge, not a timing signal.",
  "VIX": "S&P 500 30-day implied volatility. Below 15 calm, 15 to 20 normal, 20 to 30 elevated, 30+ fearful.",
  "MA": "Moving Average. The N-day average closing price. Trend reference.",
  "20MA": "20-day moving average. Short-term trend reference. Price too far above is statistically late.",
  "ATR": "Average True Range. Average daily price swing, used to size stops.",
  "FOMO ceiling": "Price more than 2 ATR above the 20MA. Entries above it are statistically late.",
  "DXY": "US Dollar Index versus a basket of major currencies. Rising DXY pressures stocks and commodities.",
  "10Y": "10-year Treasury yield. Rising yields tend to pressure long-duration tech.",
  "V/OI": "Volume divided by Open Interest. Above 1 is fresh positioning, not roll activity.",
  "vol/OI": "Same as V/OI. Above 1 means today's volume far exceeds existing open contracts.",
  "IV": "Implied Volatility. The market's forward vol estimate baked into option prices. Spikes pre-earnings.",
  "LEAP": "Long-dated option, expiry typically 9+ months out. For multi-quarter directional theses.",
  "LEAPS": "Long-dated options. Expiry over 9 months out.",
  "PEAD": "Post-Earnings Announcement Drift. Beats tend to keep drifting in the surprise direction for weeks.",
  "ETF": "Exchange-Traded Fund. A basket of securities trading like a single stock.",
  "SPY": "S&P 500 ETF. The market's headline gauge.",
  "QQQ": "Nasdaq-100 ETF. Heavily tech-weighted.",
  "IWM": "Russell 2000 ETF. The small-cap, risk-on breadth read.",
  "XLE": "Energy Sector ETF.",
  "XLK": "Technology Sector ETF.",
  "XLV": "Health Care Sector ETF.",
  "XLU": "Utilities Sector ETF. Defensive, yield-oriented.",
  "XLY": "Consumer Discretionary Sector ETF.",
  "XLRE": "Real Estate Sector ETF.",
  "WSB": "r/WallStreetBets. High mention scores often correlate with squeezes and momentum chasing.",
  "ATH": "All-Time High.",
  "MoM": "Month over Month. Change versus prior month.",
  "JOLTS": "Job Openings and Labor Turnover Survey. Monthly US hiring read.",
  "ISM": "Institute for Supply Management. Above 50 expansion, below 50 contraction.",
  "BTC": "Bitcoin. The largest cryptocurrency.",
  "ETH": "Ethereum. Second-largest crypto, leading smart-contract platform.",
  "contango": "Futures curve sloping up. Later contracts cost more than nearer ones.",
};

// Pre-build the sorted glossary HTML once at module load (modal reuses it).
const GLOSSARY_HTML = (function() {
  const escapeHtml = s => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  return Object.entries(GLOSSARY)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([k, v]) => `<div class="mw-glossary-row">
      <dt class="mw-glossary-term">${escapeHtml(k)}</dt>
      <dd class="mw-glossary-def">${escapeHtml(v)}</dd>
    </div>`).join("");
})();

// ============================================================
//  STATE
// ============================================================
let DATA = null;
let ACTIVE_BRIEF = null;
let TAB = "stocks";
let OPEN_ID = null;
let MODAL = null;
let MODE = (function() {
  try { return localStorage.getItem("mw_detail_mode") || "plain"; }
  catch { return "plain"; }
})();

function setMode(m) {
  MODE = m;
  try { localStorage.setItem("mw_detail_mode", m); } catch {}
}

// THEME_PREF is what the user picked: "system" | "light" | "dark".
// The applied data-theme attribute is always "light" or "dark" (computed from
// system preference when THEME_PREF is "system").
let THEME_PREF = (function() {
  try {
    const v = localStorage.getItem("mw_theme_pref");
    if (v === "system" || v === "light" || v === "dark") return v;
    // Migrate legacy mw_theme key if present (was just light/dark, no system)
    const legacy = localStorage.getItem("mw_theme");
    if (legacy === "light" || legacy === "dark") return legacy;
  } catch {}
  return "system";
})();

const _systemPrefersDark = () =>
  window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

function appliedThemeFor(pref) {
  if (pref === "light" || pref === "dark") return pref;
  return _systemPrefersDark() ? "dark" : "light";
}

function setTheme(pref) {
  THEME_PREF = pref;
  try { localStorage.setItem("mw_theme_pref", pref); } catch {}
  document.documentElement.dataset.theme = appliedThemeFor(pref);
  // Update settings popover radio state if open.
  document.querySelectorAll("[data-theme-pref]").forEach(b =>
    b.classList.toggle("is-active", b.dataset.themePref === pref));
}
// Apply on first load
document.documentElement.dataset.theme = appliedThemeFor(THEME_PREF);

// React to OS theme flips while user is on "system".
if (window.matchMedia) {
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
    if (THEME_PREF === "system") {
      document.documentElement.dataset.theme = appliedThemeFor("system");
    }
  });
}

// Toggle the settings popover open/closed.
function toggleSettings(forceClose) {
  const pop = document.getElementById("mw-settings-pop");
  if (!pop) return;
  if (forceClose === true) { pop.classList.remove("is-open"); return; }
  pop.classList.toggle("is-open");
}

// ============================================================
//  HELPERS
// ============================================================
const escHtml = s => String(s == null ? "" : s)
  .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

const escAttr = s => escHtml(s);

function fmtNum(n, dp = 2) {
  if (n == null || isNaN(n)) return "-";
  if (Math.abs(n) >= 1000) return Number(n).toLocaleString("en-US", { maximumFractionDigits: dp });
  return Number(n).toFixed(dp);
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return "";
  const sign = n > 0 ? "+" : n < 0 ? "-" : "";
  return `${sign}${Math.abs(n).toFixed(2)}%`;
}

function pctClass(n) {
  if (n == null) return "";
  return n > 0 ? "is-up" : n < 0 ? "is-down" : "";
}

function abbr(term, label) {
  const def = GLOSSARY[term];
  const text = escHtml(label || term);
  if (!def) return text;
  return `<span class="mw-glossy" tabindex="0" data-tt="${escAttr(def)}">${text}</span>`;
}

function sparkSvg(data, w = 80, h = 22, sw = 1.25) {
  if (!data || data.length < 2) return "";
  // Loop-based min/max instead of spread (avoids large-array stack pressure)
  let min = data[0], max = data[0];
  for (let i = 1; i < data.length; i++) {
    const v = data[i];
    if (v < min) min = v;
    else if (v > max) max = v;
  }
  const range = (max - min) || 1;
  const stepX = w / (data.length - 1);
  let pts = "";
  for (let i = 0; i < data.length; i++) {
    if (i) pts += " ";
    pts += (i * stepX).toFixed(2) + "," + (h - (data[i] - min) / range * h).toFixed(2);
  }
  // Color follows TODAY's direction (last close vs previous close), not the
  // 14-day delta — a name that's up over two weeks but down on the day reads
  // as red in the row, matching the % chip beside it.
  const last = data[data.length - 1], prev = data[data.length - 2];
  const trend = last > prev ? "up" : last < prev ? "down" : "flat";
  return `<svg class="mw-spark mw-spark-${trend}" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <polyline fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>
  </svg>`;
}

// Module-level sparks reference, set by paneHtmlFor / renderMasthead so
// tickerPill can auto-resolve the chgPct color when callers don't pass one.
// Keeps every ticker mention consistent (logo + colored pill) without threading
// sparks through every render function.
let CURRENT_SPARKS = {};
// 1-year daily closes per ticker. Populated by enrich_briefs.py and consumed
// by the mobile detail overlay to draw a Robinhood-style price chart at the
// top of each per-ticker page.
let CURRENT_HISTORY_1Y = {};

// Persistent per-ticker price archive, served as a separate static asset.
// Format: { version, updated_at, tickers: { TICKER: [["YYYY-MM-DD", close], ...] } }
// Closes are integers (whole dollars). Owned by refresh_price_history.py;
// this file is the only writer. The detail-overlay chart reads from here.
let PRICES = { tickers: {} };

// Page-side aliases used in briefs (vix, ten_year, ...) that map to the
// yfinance symbol the price archive stores under.
const PRICE_ALIASES = {
  vix:      "^VIX",
  ten_year: "^TNX",
  dxy:      "DX-Y.NYB",
  oil:      "CL=F",
  gold:     "GC=F",
};

function getPriceSeries(sym) {
  if (!sym) return null;
  const ts = PRICES.tickers || {};
  let s = ts[sym];
  if (s && s.length >= 2) return s;
  const a = PRICE_ALIASES[sym];
  if (a && (s = ts[a]) && s.length >= 2) return s;
  return null;
}

// Robinhood-style 1y price line chart. Larger than sparkSvg, with a soft
// area fill under the line and start/end price labels. Designed for the
// mobile detail overlay header. Returns "" when there isn't enough data.
function priceChartSvg(data, w = 320, h = 96) {
  if (!data || data.length < 2) return "";
  let min = data[0], max = data[0];
  for (let i = 1; i < data.length; i++) {
    const v = data[i];
    if (v < min) min = v;
    else if (v > max) max = v;
  }
  const range = (max - min) || 1;
  const padTop = 6, padBot = 6;
  const innerH = h - padTop - padBot;
  const stepX = w / (data.length - 1);
  let line = "";
  for (let i = 0; i < data.length; i++) {
    if (i) line += " ";
    const x = (i * stepX).toFixed(2);
    const y = (padTop + innerH - (data[i] - min) / range * innerH).toFixed(2);
    line += x + "," + y;
  }
  const first = data[0], last = data[data.length - 1];
  // Trend color tracks TODAY's direction (last vs previous close) so the
  // chart line on a "down today" name reads red even when the 1Y is positive.
  const prev = data[data.length - 2];
  const trend = last > prev ? "up" : last < prev ? "down" : "flat";
  const lastY = (padTop + innerH - (last - min) / range * innerH).toFixed(2);
  const firstY = (padTop + innerH - (first - min) / range * innerH).toFixed(2);
  const fillId = "mw-pcg-" + Math.random().toString(36).slice(2, 8);
  return `<svg class="mw-pchart mw-pchart-${trend}" width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="${fillId}" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="currentColor" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon fill="url(#${fillId})" points="0,${h} ${line} ${w.toFixed(2)},${h}"/>
    <polyline fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" points="${line}"/>
    <circle cx="0" cy="${firstY}" r="2" fill="currentColor" opacity="0.5"/>
    <circle cx="${w.toFixed(2)}" cy="${lastY}" r="2.5" fill="currentColor"/>
  </svg>`;
}

function pctChange(first, last) {
  if (!Number.isFinite(first) || !Number.isFinite(last) || first === 0) return null;
  return (last - first) / first * 100;
}

// Attaches Robinhood-style finger-scrub interaction to a hero chart.
// Drag across the chart and the price/% pair + date label below the chart
// snap to the day under the finger. Releasing restores the period summary.
function attachChartScrub(heroEl, series) {
  const svg = heroEl.querySelector('.mw-pchart');
  if (!svg) return;
  const priceEl  = heroEl.querySelector('.mw-hero-price');
  const pctEl    = heroEl.querySelector('.mw-hero-pct');
  const scrubEl  = heroEl.querySelector('.mw-hero-scrub');
  if (!priceEl || !pctEl || !scrubEl) return;

  const closes = series.map(p => Number(p[1]));
  const dates  = series.map(p => p[0]);
  const first = closes[0];
  let min = closes[0], max = closes[0];
  for (let i = 1; i < closes.length; i++) {
    const v = closes[i];
    if (v < min) min = v;
    else if (v > max) max = v;
  }
  const range = (max - min) || 1;
  const vb = (svg.getAttribute('viewBox') || '0 0 320 120').split(/\s+/).map(Number);
  const viewW = vb[2], viewH = vb[3];
  const padTop = 6, padBot = 6, innerH = viewH - padTop - padBot;

  const NS = 'http://www.w3.org/2000/svg';
  const cross = document.createElementNS(NS, 'line');
  cross.setAttribute('class', 'mw-pchart-cross');
  cross.setAttribute('y1', '0');
  cross.setAttribute('y2', String(viewH));
  cross.setAttribute('stroke', 'currentColor');
  cross.setAttribute('stroke-width', '0.6');
  cross.setAttribute('stroke-dasharray', '2 3');
  cross.setAttribute('opacity', '0');
  svg.appendChild(cross);
  const dot = document.createElementNS(NS, 'circle');
  dot.setAttribute('class', 'mw-pchart-cursor');
  dot.setAttribute('r', '3.5');
  dot.setAttribute('fill', 'currentColor');
  dot.setAttribute('opacity', '0');
  svg.appendChild(dot);

  const defaultPriceTxt = priceEl.textContent;
  const defaultPctHtml  = pctEl.innerHTML;
  const defaultPctClass = pctEl.className;

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(iso) {
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
    if (!m) return iso || '';
    return `${MONTHS[+m[2]-1]} ${+m[3]}, ${m[1]}`;
  }

  function show(clientX) {
    const rect = svg.getBoundingClientRect();
    if (rect.width <= 0) return;
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const idx = Math.round(ratio * (closes.length - 1));
    const close = closes[idx];
    const date  = dates[idx];
    const pct   = ((close - first) / first) * 100;
    priceEl.textContent = '$' + Math.round(close);
    const trend = pct > 0 ? 'is-up' : pct < 0 ? 'is-down' : '';
    pctEl.className = 'mw-hero-pct mw-mono ' + trend;
    pctEl.innerHTML = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%<span class="mw-hero-period">1Y</span>';
    scrubEl.textContent = fmtDate(date);
    const x = (idx / (closes.length - 1)) * viewW;
    const y = padTop + innerH - (close - min) / range * innerH;
    cross.setAttribute('x1', x.toFixed(2));
    cross.setAttribute('x2', x.toFixed(2));
    cross.setAttribute('opacity', '0.45');
    dot.setAttribute('cx', x.toFixed(2));
    dot.setAttribute('cy', y.toFixed(2));
    dot.setAttribute('opacity', '1');
  }
  function hide() {
    priceEl.textContent = defaultPriceTxt;
    pctEl.className = defaultPctClass;
    pctEl.innerHTML = defaultPctHtml;
    scrubEl.innerHTML = '&nbsp;';
    cross.setAttribute('opacity', '0');
    dot.setAttribute('opacity', '0');
  }

  svg.addEventListener('touchstart', e => { if (e.touches[0]) { show(e.touches[0].clientX); e.preventDefault(); } }, {passive:false});
  svg.addEventListener('touchmove',  e => { if (e.touches[0]) { show(e.touches[0].clientX); e.preventDefault(); } }, {passive:false});
  svg.addEventListener('touchend',    hide);
  svg.addEventListener('touchcancel', hide);
  svg.addEventListener('mousedown',  e => show(e.clientX));
  svg.addEventListener('mousemove',  e => { if (e.buttons & 1) show(e.clientX); });
  svg.addEventListener('mouseleave', hide);
  svg.addEventListener('mouseup',    hide);
}

function tickerPill(sym, size, opts) {
  const small = size === "sm";
  // Default behavior: show logo, auto-resolve chgPct from CURRENT_SPARKS.
  // Callers can opt out explicitly with {withLogo: false} or pass chgPct: null.
  const withLogo = opts && opts.withLogo === false ? false : true;
  let chgPct;
  if (opts && opts.chgPct !== undefined) {
    chgPct = (typeof opts.chgPct === "number" && Number.isFinite(opts.chgPct))
      ? opts.chgPct : null;
  } else {
    chgPct = chgPctFromSparks(CURRENT_SPARKS, sym);
  }
  const tone = chgPct === null ? "" : chgPct > 0 ? "up" : chgPct < 0 ? "down" : "";
  const inner = withLogo
    ? `${tickerLogo(sym)}<span class="mw-tpill-sym">${escHtml(sym)}</span>`
    : escHtml(sym);
  const cls = [
    "mw-tpill", "mw-mono",
    small ? "mw-tpill-sm" : "",
    withLogo ? "mw-tpill-logo" : "",
    tone ? `mw-tpill-${tone}` : ""
  ].filter(Boolean).join(" ");
  return `<span class="${cls}">${inner}</span>`;
}

// Compute today's % change for a ticker from the brief's sparks map.
// Returns null if no/short series — so callers fall back to neutral color.
function chgPctFromSparks(sparks, sym) {
  const arr = sparks && sparks[sym];
  if (!Array.isArray(arr) || arr.length < 2) return null;
  const a = Number(arr[arr.length - 1]);
  const b = Number(arr[arr.length - 2]);
  if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return null;
  return ((a - b) / b) * 100;
}

// Returns an <img> for a US-listed ticker logo, with onerror fallback chain
// FMP -> Parqet -> hide. Hiding leaves the ticker letters standing alone.
function tickerLogo(sym) {
  const s = escAttr(sym);
  const primary = `https://financialmodelingprep.com/image-stock/${s}.png`;
  const fallback = `https://assets.parqet.com/logos/symbol/${s}`;
  return `<img class="mw-tlogo" src="${primary}" alt=""
    loading="lazy" decoding="async"
    onerror="if(this.dataset.f!='1'){this.dataset.f='1';this.src='${fallback}';}else{this.style.display='none';}">`;
}

// Renders the action target column for renderTopActions.
// - If sym matches a ticker shape, emits [logo][TICKER colored by chg].
// - Otherwise emits a neutral text span (e.g. "Indices").
function actionTarget(sym, chgPct) {
  const s = String(sym || "");
  if (!s) return `<span class="mw-action-target-empty"></span>`;
  const isTicker = /^[A-Z]{1,6}$/.test(s);
  if (!isTicker) {
    return `<span class="mw-action-target-text mw-mono">${escHtml(s)}</span>`;
  }
  let tone = "neutral";
  if (typeof chgPct === "number" && Number.isFinite(chgPct)) {
    if (chgPct > 0) tone = "up";
    else if (chgPct < 0) tone = "down";
  }
  return `<span class="mw-action-target mw-action-target-${tone}">
    ${tickerLogo(s)}<span class="mw-action-target-sym mw-mono">${escHtml(s)}</span>
  </span>`;
}

function actionPill(verb, size) {
  const v = String(verb || "").toUpperCase();
  const tone = v.includes("WATCH") ? "watch"
             : v.includes("NO ACTION") || v === "NONE" ? "none"
             : v.includes("LONG") || v.includes("BUY") ? "long"
             : v.includes("SHORT") || v.includes("SELL") || v.includes("AVOID") ? "short"
             : v.includes("ACTION") ? "action"
             : v.includes("OPEN") ? "open"
             : v.includes("PRE-MARKET") || v.includes("AFTER-HOURS") ? "watch"
             : v.includes("CLOSED") ? "none"
             : v.includes("TRIM") || v.includes("HOLD") ? "neutral"
             : "neutral";
  return `<span class="mw-pill mw-pill-${tone} ${size === "sm" ? "mw-pill-sm" : ""}">${escHtml(v)}</span>`;
}

function statusDot(status) {
  const s = String(status || "FAR").toUpperCase();
  const map = {
    "TRIGGERED": "trig", "IN_ZONE": "in", "NEAR": "near",
    "FAR": "far", "INVALIDATED": "inv"
  };
  return `<span class="mw-status mw-status-${map[s] || "near"}">${s.replace(/_/g, " ")}</span>`;
}

function caret(present) {
  return present ? `<span class="mw-caret" aria-hidden="true">v</span>` : "";
}

// detail can be a plain string (legacy) or an object {plain, pro}.
function getDetail(item) {
  if (!item) return "";
  const d = item.detail;
  if (!d) return "";
  if (typeof d === "string") return d;
  if (typeof d === "object") return d[MODE] || d.plain || d.pro || "";
  return "";
}
function hasDetail(item) {
  if (!item) return false;
  const d = item.detail;
  if (!d) return false;
  if (typeof d === "string") return true;
  return !!(d.plain || d.pro);
}

// rec.action is similarly {plain, pro}
function getRecAction(rec) {
  if (!rec) return "";
  const a = rec.action;
  if (!a) return "";
  if (typeof a === "string") return a;
  return a[MODE] || a.plain || a.pro || "";
}

function isOpen(id) { return OPEN_ID === id; }

// Always emit the detail block. CSS hides it unless the parent has .is-open.
// Click-to-toggle is handled by a single delegated handler in mount().
function expandLi(id, summary, detailHtml, extraClass, extraAttrs) {
  const cls = `mw-li ${extraClass || ""} ${detailHtml ? "is-clickable" : ""}`.trim();
  const det = detailHtml ? `<div class="mw-li-detail">${detailHtml}</div>` : "";
  const handler = detailHtml ? `data-toggle="${escAttr(id)}"` : "";
  const row = detailHtml ? `data-row="${escAttr(id)}"` : "";
  const attrs = extraAttrs ? Object.entries(extraAttrs).map(([k, v]) =>
    v == null || v === false ? "" : (v === true ? k : `${k}="${escAttr(v)}"`)
  ).join(" ") : "";
  return `<li class="${cls}" ${row} ${attrs}><div class="mw-li-summary" ${handler}>${summary}</div>${det}</li>`;
}

function expandRow(id, cells, detailHtml, cols, extraClass) {
  const cls = `mw-row ${extraClass || ""} ${detailHtml ? "is-clickable" : ""}`.trim();
  const handler = detailHtml ? `data-toggle="${escAttr(id)}"` : "";
  const row = detailHtml ? `data-row="${escAttr(id)}"` : "";
  const detRow = detailHtml
    ? `<tr class="mw-row-detail" ${row}><td colspan="${cols}"><div class="mw-detail-inner">${detailHtml}</div></td></tr>`
    : "";
  return `<tr class="${cls}" ${handler} ${row}>${cells}</tr>${detRow}`;
}

// Render the inline detail block — picks the right text based on MODE.
function renderDetail(item) {
  return hasDetail(item) ? escHtml(getDetail(item)) : null;
}

// ============================================================
//  DATA NORMALIZATION
// ============================================================
function normalize(brief) {
  const sparks = brief.sparks || {};
  const chgFromSpark = (sym) => {
    const arr = sparks[sym];
    if (!Array.isArray(arr) || arr.length < 2) return null;
    const a = Number(arr[arr.length - 1]);
    const b = Number(arr[arr.length - 2]);
    if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return null;
    return ((a - b) / b) * 100;
  };
  const actions = (brief.top_actions || []).map(a => {
    if (typeof a === "object" && a !== null) {
      return {
        verb: a.verb || "WATCH",
        target: a.target || "",
        text: a.text || "",
        detail: a.detail || "",
        chg_pct: chgFromSpark(a.target || "")
      };
    }
    const s = String(a);
    let verb = "WATCH", rest = s;
    const m = s.match(/^(ACTION|WATCH|NO ACTION|NONE|LONG|SHORT)\s+(.*)$/i);
    if (m) { verb = m[1].toUpperCase(); rest = m[2]; }
    const t = rest.match(/^([A-Z]{2,6})\s+(.*)$/);
    let target = "", text = rest;
    if (t) { target = t[1]; text = t[2]; }
    return { verb, target, text, detail: "", chg_pct: chgFromSpark(target) };
  });

  const sr = brief.macro?.sector_rotation || {};
  const leaders = sr.leaders_5d || brief.macro?.leaders_5d || [];
  const laggards = sr.laggards_5d || brief.macro?.laggards_5d || [];
  const rotation_read = sr.read || brief.macro?.rotation_read || "";

  const watchlist = (brief.stocks?.watchlist || []).map(w => ({
    ticker: w.ticker,
    last: w.last,
    chg: w.chg ?? w.change_pct,
    zone: w.zone ?? w.trigger_zone,
    status: w.status,
    note: w.note,
    detail: w.detail
  }));

  const smart_money = brief.stocks?.smart_money || brief.stocks?.smart_money_clusters || [];

  // Keep headline raw (string or {plain,pro} object). Mode-pick happens in
  // renderMasthead so normalize stays a pure function of brief identity and
  // its memo survives MODE toggles.

  return {
    date: brief.date,
    updated: brief.updated_at || brief.last_refreshed_at,
    regime: brief.regime || "NEUTRAL",
    regime_note: brief.regime_note || "",
    actions,
    market_status: brief.market_status,
    sparks: brief.sparks || {},
    macro: {
      tab_intro: brief.macro?.tab_intro || null,
      actions:   brief.macro?.actions || [],
      indices: brief.macro?.indices || [],
      vol_yields: brief.macro?.vol_yields || {},
      leaders, laggards, rotation_read,
      events_14d: brief.macro?.events_14d || [],
      earnings_7d: brief.macro?.earnings_7d || [],
      recommendations: brief.macro?.recommendations,
      social: brief.macro?.social || []
    },
    stocks: {
      tab_intro: brief.stocks?.tab_intro || null,
      actions:   brief.stocks?.actions || [],
      watchlist,
      movers: brief.stocks?.movers || { gainers: [], losers: [] },
      smart_money,
      wsb_top: brief.stocks?.wsb_top || [],
      recommendations: brief.stocks?.recommendations,
      social: brief.stocks?.social || []
    },
    options: {
      tab_intro: brief.options?.tab_intro || null,
      actions:   brief.options?.actions || [],
      unusual: brief.options?.unusual || [],
      earnings_iv: brief.options?.earnings_iv || [],
      leaps: brief.options?.leaps || [],
      wheel_candidates: brief.options?.wheel_candidates || [],
      recommendations: brief.options?.recommendations,
      social: brief.options?.social || []
    },
    crypto: {
      tab_intro: brief.crypto?.tab_intro || null,
      actions:   brief.crypto?.actions || [],
      ...(brief.crypto || { status: "coming_soon" }),
      social: brief.crypto?.social || []
    }
  };
}

// ============================================================
//  RENDER PIECES
// ============================================================
function renderMasthead(b) {
  // Today's wall-clock date (dynamic). When the brief is from a different
  // day, surface both so a stale brief is visually obvious.
  const todayLabel = todayString();
  const todayKey = todayISO();
  const briefLabel = b.date ? formatDate(b.date) : "";
  const isStale = b.date && b.date !== todayKey;
  const datePart = !briefLabel
    ? todayLabel
    : isStale
      ? `${todayLabel} · Brief from ${briefLabel}`
      : briefLabel;
  const upd = b.updated ? "Updated " + formatTime(b.updated) : "";
  const meta = [datePart, upd].filter(Boolean).join(" · ");

  const gearSvg = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;

  const settingsPop = `<div class="mw-settings-wrap">
    <button class="mw-settings-btn" id="mw-settings-btn" aria-label="Menu" aria-haspopup="true">${gearSvg}</button>
    <div class="mw-settings-pop" id="mw-settings-pop" role="menu" aria-label="Menu">
      <div class="mw-settings-section">
        <div class="mw-settings-label">Theme</div>
        <div class="mw-settings-options">
          <button data-theme-pref="system" class="${THEME_PREF === 'system' ? 'is-active' : ''}">System</button>
          <button data-theme-pref="light"  class="${THEME_PREF === 'light' ? 'is-active' : ''}">Light</button>
          <button data-theme-pref="dark"   class="${THEME_PREF === 'dark' ? 'is-active' : ''}">Dark</button>
        </div>
      </div>
      <div class="mw-settings-section">
        <div class="mw-settings-label">Detail</div>
        <div class="mw-settings-options">
          <button data-mode="plain" class="${MODE === 'plain' ? 'is-active' : ''}">Plain</button>
          <button data-mode="pro"   class="${MODE === 'pro' ? 'is-active' : ''}">Pro</button>
        </div>
      </div>
      <div class="mw-settings-section mw-settings-links">
        <button class="mw-settings-link" data-modal="glossary">Glossary</button>
        <button class="mw-settings-link" data-modal="archive">Archive</button>
        <button class="mw-settings-link" data-modal="feedback">Feedback</button>
      </div>
    </div>
  </div>`;

  return `<header class="mw-masthead">
    <div class="mw-mast-top">
      <h1 class="mw-wordmark">
        <span class="mw-wordmark-word">MARKET</span><span class="mw-wordmark-word">WATCH</span>
      </h1>
      ${settingsPop}
    </div>
    <div class="mw-tagline-rule"></div>
    ${meta ? `<div class="mw-mast-date mw-mono">${escHtml(meta)}</div>` : ""}
    <div class="mw-regime-row">
      <span class="mw-regime mw-regime-${b.regime}">${escHtml(b.regime)}</span>
    </div>
    ${b.regime_note ? `<p class="mw-regime-note mw-regime-note-${b.regime}">${escHtml(b.regime_note)}</p>` : ""}
  </header>`;
}

// Render Today's Actions for a single tab. Reuses the same row shape as the
// retired global renderTopActions but pulls from `tab.actions[]`. No-op if
// the tab has no actions for today.
function renderPerTabActions(actions) {
  if (!Array.isArray(actions) || !actions.length) return "";
  const visible = actions.filter(a => {
    const v = String(a.verb || "").toUpperCase();
    return v && !v.includes("NO ACTION") && v !== "NONE";
  });
  if (!visible.length) return "";
  const rows = visible.map((a, i) => {
    const id = `tabaction-${i}-${(a.target || "").replace(/[^a-zA-Z0-9]/g, "_")}`;
    const chgStr = (typeof a.chg_pct === "number" && Number.isFinite(a.chg_pct))
      ? `<span class="mw-action-chg mw-mono">${a.chg_pct >= 0 ? "+" : ""}${a.chg_pct.toFixed(2)}%</span>`
      : `<span class="mw-action-chg mw-action-chg-empty"></span>`;
    const rh = a.robinhood ? pickModeText(a.robinhood) : "";
    // Robinhood directive shows ONLY in the detail panel (revealed on tap).
    // Detail combines the analytical context with the Robinhood action.
    const detailHtml = (hasDetail(a) || rh)
      ? `${rh ? `<p class="mw-action-rh-block"><strong>In Robinhood:</strong> ${escHtml(rh)}</p>` : ""}${hasDetail(a) ? `<p class="mw-action-detail-text">${escHtml(getDetail(a))}</p>` : ""}`
      : null;
    const tgt = String(a.target || "");
    const isTicker = /^[A-Z]{1,6}$/.test(tgt);
    const sparkData = isTicker ? (CURRENT_SPARKS[tgt] || []) : [];
    const sparkHtml = sparkData.length >= 2
      ? `<span class="mw-action-spark">${sparkSvg(sparkData, 56, 18, 1.4)}</span>`
      : "";
    const summary = `
      ${actionTarget(a.target, a.chg_pct)}
      ${sparkHtml}
      ${chgStr}
      ${actionPill(a.verb, "sm")}
      <span class="mw-action-text">${escHtml(a.text)}</span>
      ${caret(!!detailHtml)}`;
    return expandLi(id, summary, detailHtml, "mw-action-item");
  }).join("");
  return `<section class="mw-top-actions mw-tab-actions">
    <div class="mw-eyebrow">
      <span class="mw-eyebrow-mark mw-mono">&gt;</span>
      <span class="mw-eyebrow-text mw-mono">Today's actions</span>
      <span class="mw-eyebrow-rule"></span>
      <span class="mw-mono mw-eyebrow-count">${visible.length}</span>
    </div>
    <ul class="mw-action-list">${rows}</ul>
  </section>`;
}

// Render a tab-level intro: 3-5 bullets specific to the tab, in priority order.
// On phones only the first 2 render visibly; the rest sit behind a "Show N more"
// button that routes into the mobile detail overlay (a separate page showing
// every bullet). Desktop sees all bullets (the toggle is CSS-hidden there).
// Skill-side contract: bullets[0] and bullets[1] must be the highest-priority
// insights.
function renderTabIntro(intro, tab) {
  if (!intro || typeof intro !== "object") return "";
  const bullets = (Array.isArray(intro.bullets) ? intro.bullets.filter(Boolean) : []).slice(0, 5);
  if (!bullets.length) return "";
  const visible = bullets.map((it, i) => {
    const cls = i >= 2 ? "mw-bullet-extra" : "";
    return `<li class="${cls}"><span class="mw-hb-dot" aria-hidden="true">·</span>${escHtml(pickModeText(it))}</li>`;
  }).join("");
  const extra = Math.max(0, bullets.length - 2);
  if (!extra) {
    return `<section class="mw-tab-intro">
      <ul class="mw-tab-intro-bullets">${visible}</ul>
    </section>`;
  }
  const id = `tabintro-${tab || "x"}`;
  const tabLabel = (TABS.find(t => t.id === tab) || {}).label || "";
  const overlayTitle = `${tabLabel} highlights`;
  const allItems = bullets.map(it =>
    `<li><span class="mw-hb-dot" aria-hidden="true">·</span>${escHtml(pickModeText(it))}</li>`
  ).join("");
  return `<section class="mw-tab-intro" data-row="${escAttr(id)}" data-overlay-title="${escAttr(overlayTitle)}" data-overlay-no-echo>
    <ul class="mw-tab-intro-bullets">${visible}</ul>
    <button type="button" class="mw-tab-intro-more" data-toggle="${escAttr(id)}">Show ${extra} more</button>
    <div class="mw-li-detail mw-tab-intro-detail">
      <ul class="mw-tab-intro-bullets mw-tab-intro-bullets-all">${allItems}</ul>
    </div>
  </section>`;
}

function renderMarketStatus(s) {
  if (!s) return "";
  const tier = String(s.tier || "").toUpperCase();
  const cls = tier.includes("OPEN") ? "mw-mstatus-open"
            : tier.includes("PRE")  ? "mw-mstatus-pre"
            : tier.includes("AFTER") ? "mw-mstatus-post"
            : "mw-mstatus-closed";
  return `<div class="mw-mstatus ${cls}">
    ${actionPill(s.tier, "sm")}
    <span class="mw-mstatus-text">${escHtml(s.text || "")}</span>
  </div>`;
}

function card({ title, count, body, action, span }) {
  const head = `<div class="mw-card-head">
    <h3 class="mw-card-title">${title}</h3>
    ${count != null ? `<span class="mw-card-count">${count}</span>` : ""}
  </div>`;
  const foot = action ? `<div class="mw-card-footer mw-card-footer-${String(action.tier || "").toLowerCase().replace(/\s/g, "-")}">
      ${actionPill(action.tier, "sm")}
      <span class="mw-card-action-text">${escHtml(action.text || "")}</span>
    </div>` : "";
  return `<section class="mw-card ${span ? `mw-card-span-${span}` : ""}">${head}<div class="mw-card-body">${body}</div>${foot}</section>`;
}

// ──────────────── RECOMMENDATIONS ────────────────
function confidenceMeta(n) {
  if (n == null || n === "") return null;
  if (n >= 70)      return { label: "HIGH", klass: "high", score: n,
    short: "Strong, decision-grade call.",
    full: "The trader has strong evidence behind this call and considers it actionable today. 70 and above is the threshold for a real-money decision per the trader's own rulebook." };
  if (n >= 40)      return { label: "MED",  klass: "med",  score: n,
    short: "Medium conviction.",
    full: "The setup is real but missing one or two confirmations. Worth watching this week, not necessarily acting on yet. Wait for a corroborating signal (volume, sector strength, news catalyst) before sizing." };
  return { label: "LOW", klass: "low", score: n,
    short: "Low conviction, observation only.",
    full: "Logged for tracking purposes. Do not act on this alone. The trader is flagging it as a name to watch in case more signals line up later." };
}

function confidenceBadge(n) {
  const m = confidenceMeta(n);
  if (!m) return "";
  const tip = `Confidence ${m.score} of 100. ${m.short}`;
  return `<span class="mw-rec-conf mw-rec-conf-${m.klass}" data-tt="${escAttr(tip)}">Conf ${m.label}</span>`;
}

function confidenceRow(n, reason) {
  const m = confidenceMeta(n);
  if (!m) return "";
  // Per-rec reason is the actually-useful text. Fall back to the generic
  // bucket meaning only if no per-rec reason was supplied. The bucket meaning
  // is also reachable by hovering the badge in the summary row.
  const text = (reason && reason.trim()) ? reason : m.full;
  return `<div class="mw-rec-debate-row">
    <span class="mw-rec-debate-label mw-rec-debate-label-${m.klass}">Confidence</span>
    <p class="mw-rec-debate-text">
      <span class="mw-rec-conf mw-rec-conf-${m.klass}" style="margin-right:8px">${m.label}</span>
      <span class="mw-mono mw-dim">${m.score} of 100.</span>
      ${escHtml(text)}
    </p>
  </div>`;
}

function renderRecCard(rec, side, prefix, sparks) {
  const id = `rec-${prefix}-${side}-${rec.ticker.replace(/[^a-zA-Z0-9]/g, "_")}`;
  const confHtml = confidenceBadge(rec.confidence);
  const confDetail = confidenceRow(rec.confidence, rec.confidence_reason);
  const action = getRecAction(rec);
  // For ticker-shaped rec.ticker (single-ticker recs, common in stocks/macro/crypto),
  // promote the leading slot to a logo + colored ticker chip. Trade-name recs
  // (e.g. "AMD 5/16 365/380 call spread") fall through to the original text.
  const isTicker = /^[A-Z]{1,6}$/.test(String(rec.ticker || ""));
  const chgPct = isTicker && sparks ? chgPctFromSparks(sparks, rec.ticker) : null;
  const tickerEl = isTicker
    ? tickerPill(rec.ticker, null, {withLogo: true, chgPct})
    : `<span class="mw-rec-tk">${escHtml(rec.ticker)}</span>`;
  const detailBlocks = `
    <div class="mw-rec-debate">
      ${confDetail}
      ${rec.vehicle ? `<div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label">Vehicle</span>
        <p class="mw-rec-debate-text">${escHtml(rec.vehicle)}</p>
      </div>` : ""}
      <div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label is-up">Pros</span>
        <p class="mw-rec-debate-text">${escHtml(rec.pros || "")}</p>
      </div>
      <div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label is-down">Cons</span>
        <p class="mw-rec-debate-text">${escHtml(rec.cons || "")}</p>
      </div>
      ${action ? `<div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label">${MODE === 'pro' ? 'Robinhood' : 'How to act'}</span>
        <p class="mw-rec-debate-text">${escHtml(action)}</p>
      </div>` : ""}
    </div>`;
  const sparkData = isTicker && sparks ? (sparks[rec.ticker] || []) : [];
  const sparkHtml = sparkData.length >= 2
    ? `<span class="mw-rec-spark">${sparkSvg(sparkData, 56, 18, 1.4)}</span>`
    : "";
  return `<li class="mw-rec" data-row="${escAttr(id)}">
    <div class="mw-rec-summary" data-toggle="${escAttr(id)}">
      <div class="mw-rec-tk-cell">${tickerEl}</div>
      ${sparkHtml}
      <div class="mw-rec-meta">
        ${actionPill(rec.verdict, "sm")}
        ${confHtml}
      </div>
      <p class="mw-rec-summary-text">${escHtml((rec.pros || "").split(".")[0])}.</p>
      <span class="mw-caret" aria-hidden="true">v</span>
    </div>
    ${detailBlocks}
  </li>`;
}

// ──────────────── SOCIAL SENTIMENT (per tab) ────────────────
function sentClass(s) {
  const v = String(s || "").toUpperCase();
  if (v === "BULLISH") return "is-up";
  if (v === "BEARISH") return "is-down";
  if (v === "NEUTRAL" || v === "MIXED") return "is-neutral";
  return "mw-dim";
}

function renderSocialItem(item, prefix) {
  const id = `soc-${prefix}-${item.ticker.replace(/[^a-zA-Z0-9]/g, "_")}`;
  const detailHtml = renderDetail(item);
  const cls = `mw-soc-row ${detailHtml ? "is-clickable" : ""}`;
  const handler = detailHtml ? `data-toggle="${escAttr(id)}"` : "";
  const row = detailHtml ? `data-row="${escAttr(id)}"` : "";
  const sources = (item.sources || []).join(", ");
  return `<li class="${cls}" ${row}>
    <div class="mw-soc-summary" ${handler}>
      ${tickerPill(item.ticker, "sm")}
      <span class="mw-soc-mentions mw-mono">${item.mentions || 0}</span>
      <span class="mw-soc-sentiment ${sentClass(item.sentiment)} mw-mono">${escHtml(item.sentiment || "NEUTRAL")}</span>
      ${caret(hasDetail(item))}
    </div>
    ${detailHtml ? `<div class="mw-soc-detail">${detailHtml}</div>` : ""}
  </li>`;
}

function renderSocial(socialItems, prefix, tabLabel) {
  if (!socialItems || !socialItems.length) return "";
  const body = `<ul class="mw-soc-list">${socialItems.map(s => renderSocialItem(s, prefix)).join("")}</ul>`;
  return `<section class="mw-card mw-card-span-3 mw-soc-card">

      <h3 class="mw-card-title">Social chatter ${tabLabel ? "&middot; " + tabLabel : ""}</h3>
      <span class="mw-card-count">${socialItems.length} ${socialItems.length === 1 ? "ticker" : "tickers"}</span>
    </div>
    <div class="mw-card-body">
      <div class="mw-soc-head">
        <span class="mw-soc-h-tk">Ticker</span>
        <span class="mw-soc-h-mentions">Mentions</span>
        <span class="mw-soc-h-sent">Read</span>
      </div>
      ${body}
    </div>
  </section>`;
}

function renderRecommendations(recs, prefix, sparks) {
  if (!recs) return "";
  const buys = (recs.buy || []);
  const sells = (recs.sell || []);
  if (!buys.length && !sells.length) return "";

  const buyBody = buys.length
    ? `<ul class="mw-rec-list">${buys.map(r => renderRecCard(r, "buy", prefix, sparks)).join("")}</ul>`
    : `<p class="mw-empty-pad">No buy ideas with conviction today.</p>`;
  const sellBody = sells.length
    ? `<ul class="mw-rec-list">${sells.map(r => renderRecCard(r, "sell", prefix, sparks)).join("")}</ul>`
    : `<p class="mw-empty-pad">No sell ideas with conviction today.</p>`;

  return `<section class="mw-card mw-card-span-3 mw-rec-card">
    <div class="mw-card-head">
      <h3 class="mw-card-title">Top picks today</h3>
      <span class="mw-card-count">${buys.length} buy · ${sells.length} sell</span>
    </div>
    <div class="mw-card-body">
      <div class="mw-rec-grid">
        <div>
          <div class="mw-rec-head mw-rec-head-up">Best to buy</div>
          ${buyBody}
        </div>
        <div>
          <div class="mw-rec-head mw-rec-head-down">Best to sell or avoid</div>
          ${sellBody}
        </div>
      </div>
    </div>
  </section>`;
}

// ──────────────── MACRO ────────────────
function renderMacroPane(b) {
  const m = b.macro;
  const sparks = b.sparks || {};

  const idxRows = m.indices.map(r => {
    const id = `mi-${r.ticker}`;
    const spark = sparks[r.ticker] || [];
    const cells = `
      <td>${tickerPill(r.ticker)}</td>
      <td>${sparkSvg(spark, 88, 22)}</td>
      <td class="mw-mono r">${fmtNum(r.last)}</td>
      <td class="mw-mono r ${r.rsi > 70 ? "is-down" : r.rsi < 30 ? "is-up" : ""}">${r.rsi != null ? abbr("RSI", r.rsi.toFixed(1)) : "-"}</td>
      <td class="mw-dim">${escHtml(r.note || "")}${caret(hasDetail(r))}</td>`;
    return expandRow(id, cells, renderDetail(r), 5);
  }).join("");

  const indices = card({
    title: "ETFs", count: m.indices.length, span: "2",
    body: `<table class="mw-table">
      <thead><tr><th>Ticker</th><th>14d</th><th class="r">Last</th><th class="r">RSI</th><th>Note</th></tr></thead>
      <tbody>${idxRows}</tbody>
    </table>`
  });

  const vy = m.vol_yields || {};
  const vyDetails = vy.details || {};
  const VOL_KEYS = [
    {k: "vix",      label: "VIX",       fmt: v => fmtNum(v),                    proxy: "^VIX"},
    {k: "vix_term", label: "VIX term",  fmt: v => String(v).replace(/_/g, " ").toLowerCase(), proxy: null},
    {k: "ten_year", label: "10Y",       fmt: v => fmtNum(v) + "%",              proxy: "^TNX"},
    {k: "dxy",      label: "DXY",       fmt: v => fmtNum(v),                    proxy: "DX-Y.NYB"},
    {k: "oil",      label: "Oil",       fmt: v => "$" + fmtNum(v),              proxy: "CL=F"},
    {k: "gold",     label: "Gold",      fmt: v => "$" + fmtNum(v),              proxy: "GC=F"},
  ];
  const volBody = `<ul class="mw-vol-list">${VOL_KEYS.map(spec => {
    const v = vy[spec.k];
    if (v == null) return "";
    const id = `vy-${spec.k}`;
    const detailObj = vyDetails[spec.k];
    const detailText = detailObj ? pickModeText(detailObj) : "";
    const detailHtml = detailText
      ? `<p class="mw-detail-text">${escHtml(detailText)}</p>`
      : `<p class="mw-empty-pad">Tap and drag the chart above to read the price on any day.</p>`;
    const summary = `<div class="mw-vol-row">
      <span class="mw-vol-label">${escHtml(spec.label)}</span>
      <span class="mw-vol-value mw-mono">${spec.fmt(v)}</span>
      ${caret(true)}
    </div>`;
    return expandLi(id, summary, detailHtml, null, {
      "data-sym": spec.proxy || null,
      "data-overlay-title": spec.label,
      "data-overlay-no-echo": true,
    });
  }).filter(Boolean).join("")}</ul>`;
  const vol = card({ title: "Vol &amp; Yields", body: volBody });

  const rotRow = (s, dir) => {
    const id = `${dir}-${s.etf}`;
    const score = Number(s.score) || 0;
    const summary = `<div class="mw-rot-row">
      ${tickerPill(s.etf, "sm")}
      <span class="mw-rot-bar"><span class="mw-rot-fill ${score < 0 ? "mw-down" : "mw-up"}" style="width:${Math.min(Math.abs(score) * 5, 100)}%"></span></span>
      <span class="mw-mono ${score < 0 ? "is-down" : "is-up"}">${score > 0 ? "+" : ""}${score.toFixed(1)}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(s), "mw-rot-li");
  };
  const rot = card({
    title: "Sector rotation · 5d", span: "3",
    body: `<div class="mw-rot">
      <div><div class="mw-rot-head">Leaders</div><ul class="mw-rot-list">${m.leaders.map(s => rotRow(s, "lead")).join("")}</ul></div>
      <div><div class="mw-rot-head">Laggards</div><ul class="mw-rot-list">${m.laggards.map(s => rotRow(s, "lag")).join("")}</ul></div>
    </div>${m.rotation_read ? `<p class="mw-rot-read">${escHtml(m.rotation_read)}</p>` : ""}`
  });

  const calRows = m.events_14d.map((e, i) => {
    const id = `cal-${i}`;
    const summary = `<div class="mw-cal-row">
      <span class="mw-mono mw-cal-date">${escHtml(e.date)}</span>
      <span class="mw-cal-event">${escHtml(e.event || "")}${caret(hasDetail(e))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(e));
  }).join("");
  const cal = card({
    title: "Calendar · 14d", count: m.events_14d.length, span: "2",
    body: m.events_14d.length ? `<ul class="mw-cal">${calRows}</ul>` : `<p class="mw-empty">No flagged events.</p>`
  });

  const earRows = m.earnings_7d.map(e => {
    const id = `ear-${e.ticker}`;
    const summary = `<div class="mw-cal-row mw-cal-row-3">
      <span class="mw-mono mw-cal-date">${escHtml(e.date)}</span>
      ${tickerPill(e.ticker, "sm")}
      <span class="mw-cal-event mw-dim">${escHtml(e.note || "")}${caret(hasDetail(e))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(e));
  }).join("");
  const ear = card({
    title: "Earnings · 7d", count: m.earnings_7d.length,
    body: m.earnings_7d.length ? `<ul class="mw-cal">${earRows}</ul>` : `<p class="mw-empty">None within 7 days.</p>`
  });

  const recs = renderRecommendations(m.recommendations, "macro");
  const social = renderSocial(m.social, "macro", "Macro");
  const intro = renderTabIntro(m.tab_intro, "macro");
  const actions = renderPerTabActions(m.actions);
  // Order: headlines, today's actions, top picks, then the rest
  return `${intro}${actions}${recs}<div class="mw-grid">${indices}${vol}${rot}${cal}${ear}${social}</div>`;
}

// ──────────────── STOCKS ────────────────
function renderStocksPane(b) {
  const s = b.stocks;
  const sparks = b.sparks || {};
  // Prefer w.chg (today's % from the brief) over spark-derived; spark fallback for chip clouds.
  const chgFor = (sym, primary) => {
    const n = Number(primary);
    return Number.isFinite(n) ? n : chgPctFromSparks(sparks, sym);
  };

  const wlRows = s.watchlist.map(w => {
    const id = `w-${w.ticker}`;
    const klass = String(w.status).toUpperCase() === "INVALIDATED" ? "is-strike" : "";
    const cells = `
      <td>${tickerPill(w.ticker, null, {withLogo: true, chgPct: chgFor(w.ticker, w.chg)})}</td>
      <td>${sparkSvg(sparks[w.ticker] || [])}</td>
      <td class="mw-mono r">${fmtNum(w.last)}</td>
      <td class="mw-mono r ${pctClass(w.chg)}">${fmtPct(w.chg)}</td>
      <td class="mw-mono mw-trigger">${abbr("FOMO ceiling", w.zone || "")}</td>
      <td>${statusDot(w.status)}</td>
      <td class="mw-dim">${escHtml(w.note || "")}${caret(hasDetail(w))}</td>`;
    return expandRow(id, cells, renderDetail(w), 7, klass);
  }).join("");

  const watchlist = card({
    title: "Watchlist · Triggers", count: s.watchlist.length, span: "3",
    body: `<table class="mw-table mw-table-watch">
      <thead><tr><th>Ticker</th><th>14d</th><th class="r">Last</th><th class="r">&Delta;</th><th>Trigger</th><th>Status</th><th>Note</th></tr></thead>
      <tbody>${wlRows}</tbody>
    </table>`
  });

  const moverRow = (r, dir) => {
    const id = `mv-${dir}-${r.ticker}`;
    const summary = `<div class="mw-mover-row">
      ${tickerPill(r.ticker, null, {withLogo: true, chgPct: chgFor(r.ticker, r.chg)})}
      ${sparkSvg(r.spark || [], 70, 22, 1.5)}
      <span class="mw-mono mw-mover-pct ${dir === "up" ? "is-up" : "is-down"}">${fmtPct(r.chg)}</span>
      <span class="mw-mono mw-mover-last">${fmtNum(r.last)}</span>
      <span class="mw-mover-note">${escHtml(r.note || "")}${caret(hasDetail(r))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(r));
  };
  const movers = card({
    title: "Big movers · 5d",
    count: (s.movers.gainers.length || 0) + (s.movers.losers.length || 0),
    span: "3",
    body: `<div class="mw-movers">
      <div class="mw-movers-col">
        <div class="mw-movers-head mw-movers-head-up">Gainers</div>
        <ul class="mw-mover-list">${s.movers.gainers.length ? s.movers.gainers.map(r => moverRow(r, "up")).join("") : `<li class="mw-empty-pad">No gainers in scan.</li>`}</ul>
      </div>
      <div class="mw-movers-col">
        <div class="mw-movers-head mw-movers-head-down">Losers</div>
        <ul class="mw-mover-list">${s.movers.losers.length ? s.movers.losers.map(r => moverRow(r, "down")).join("") : `<li class="mw-empty-pad">No losers in scan.</li>`}</ul>
      </div>
    </div>`
  });

  // Smart-money entries are either a string (legacy: ticker only) or an
  // object {ticker, signals?, detail?}. Both render as tappable rows.
  const smItems = (s.smart_money || []).map(entry => {
    const obj = (typeof entry === "string") ? {ticker: entry} : (entry || {});
    const tk = obj.ticker;
    if (!tk) return "";
    const id = `sm-${tk}`;
    const signals = Array.isArray(obj.signals) ? obj.signals.filter(Boolean) : [];
    const sigChips = signals.length
      ? `<div class="mw-sm-signals">${signals.map(s =>
          `<span class="mw-sm-signal mw-mono">${escHtml(s)}</span>`).join("")}</div>`
      : "";
    const detailText = obj.detail ? pickModeText(obj.detail) : "";
    const detailHtml = `${sigChips}${detailText
      ? `<p class="mw-detail-text">${escHtml(detailText)}</p>`
      : (sigChips ? "" : `<p class="mw-empty-pad">Tap and drag the chart above to read the price on any day.</p>`)}`;
    const summary = `<div class="mw-sm-row">
      ${tickerPill(tk, "sm", {withLogo: true, chgPct: chgPctFromSparks(sparks, tk)})}
      ${signals.length ? `<span class="mw-sm-count mw-mono">${signals.length} signal${signals.length === 1 ? "" : "s"}</span>` : ""}
      ${caret(true)}
    </div>`;
    return expandLi(id, summary, detailHtml);
  }).filter(Boolean).join("");
  const sm = card({
    title: "Smart-money clusters", count: s.smart_money.length,
    body: s.smart_money.length
      ? `<p class="mw-card-explainer">Names showing two or more independent scanner signals on the same day (active mover, unusual options flow, breakout, social breakout, insider buying, etc.). Cluster confirmation is the highest-quality directional read in the universe; price action still has to confirm.</p>
         <ul class="mw-sm-list">${smItems}</ul>`
      : `<p class="mw-empty">No clusters today.</p>`
  });

  const wsbTop = s.wsb_top || [];
  const wsbMax = wsbTop.reduce((a, b) => Math.max(a, b.score || 0), 1) || 1;
  const wsbRows = wsbTop.map((r, i) => {
    const id = `wsb-${r.ticker}-${i}`;
    const summary = `<div class="mw-rank-row">
      <span class="mw-mono mw-rank-i">${String(i + 1).padStart(2, "0")}</span>
      ${tickerPill(r.ticker, "sm", {withLogo: true, chgPct: chgPctFromSparks(sparks, r.ticker)})}
      <span class="mw-rank-bar"><span class="mw-rank-fill" style="width:${Math.min(100, (r.score || 0) / wsbMax * 100)}%"></span></span>
      <span class="mw-mono mw-dim">${r.score || 0}</span>
      ${caret(hasDetail(r))}
    </div>`;
    return expandLi(id, summary, renderDetail(r));
  }).join("");
  const wsb = card({
    title: `${abbr("WSB")} · top ${wsbTop.length || 5}`,
    body: wsbTop.length
      ? `<p class="mw-card-explainer">Reddit retail-attention leaderboard, refreshed live from r/wallstreetbets. The bar shows mentions in the last 24 hours; tap a row for context (rank change, mention delta).</p>
         <ul class="mw-rank">${wsbRows}</ul>`
      : `<p class="mw-empty">No WSB data.</p>`
  });

  const recs = renderRecommendations(s.recommendations, "stocks", sparks);
  const social = renderSocial(s.social, "stocks", "Stocks");

  const intro = renderTabIntro(s.tab_intro, "stocks");
  const actions = renderPerTabActions(s.actions);
  // Order: headlines, today's actions, top picks, watchlist, movers, social,
  // then smart-money clusters and WSB at the end (lower-priority context).
  return `${intro}${actions}${recs}<div class="mw-grid">${watchlist}${movers}${social}${sm}${wsb}</div>`;
}

// ──────────────── OPTIONS ────────────────
// Wheel candidates: cash-secured-put ideas with debate. Single-card per ticker
// expands into pros/cons/action like recommendations. Each row leads with a
// logo + colored ticker, then the suggested CSP (strike/expiry/premium/yield).
function renderWheelCandidates(rows, sparks) {
  if (!rows || !rows.length) return "";
  const items = rows.map((r, i) => {
    const id = `wheel-${r.ticker.replace(/[^a-zA-Z0-9]/g, "_")}-${i}`;
    const isTicker = /^[A-Z]{1,6}$/.test(String(r.ticker || ""));
    const chgPct = isTicker && sparks ? chgPctFromSparks(sparks, r.ticker) : null;
    const tickerEl = isTicker
      ? tickerPill(r.ticker, null, {withLogo: true, chgPct})
      : `<span class="mw-rec-tk">${escHtml(r.ticker)}</span>`;
    const confHtml = confidenceBadge(r.confidence);
    const confDetail = confidenceRow(r.confidence, r.confidence_reason);
    const action = getRecAction(r);
    const yieldStr = r.annualized_yield_pct != null
      ? `<span class="mw-mono mw-wheel-yield">${r.annualized_yield_pct.toFixed(1)}% APY</span>`
      : "";
    const cspStr = (r.csp_strike != null && r.csp_expiry)
      ? `<span class="mw-mono mw-wheel-csp">$${fmtNum(r.csp_strike)}P · ${r.csp_expiry} · $${(r.csp_premium ?? 0).toFixed(2)}</span>`
      : "";
    const erWarn = (r.days_to_er != null && r.days_to_er < 14)
      ? `<span class="mw-wheel-erwarn mw-mono">ER in ${r.days_to_er}d</span>` : "";
    const detail = `<div class="mw-rec-debate">
      ${confDetail}
      <div class="mw-wheel-stats mw-mono">
        <span>Spot $${fmtNum(r.spot)}</span>
        <span>Strike $${fmtNum(r.csp_strike)} (${(r.csp_otm_pct ?? 0).toFixed(1)}% OTM)</span>
        <span>Premium $${(r.csp_premium ?? 0).toFixed(2)}</span>
        <span>Expiry ${r.csp_expiry} (${r.csp_dte}d)</span>
        <span>Annualized ${(r.annualized_yield_pct ?? 0).toFixed(1)}%</span>
        <span>RSI ${(r.rsi14 ?? 0).toFixed(1)}</span>
        ${r.days_to_er != null ? `<span>Next ER: ${r.next_er_date} (${r.days_to_er}d)</span>` : "<span>No ER (ETF/commodity)</span>"}
      </div>
      <div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label is-up">Pros</span>
        <p class="mw-rec-debate-text">${escHtml(r.pros || "")}</p>
      </div>
      <div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label is-down">Cons</span>
        <p class="mw-rec-debate-text">${escHtml(r.cons || "")}</p>
      </div>
      ${action ? `<div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label">${MODE === 'pro' ? 'Robinhood' : 'How to act'}</span>
        <p class="mw-rec-debate-text">${escHtml(action)}</p>
      </div>` : ""}
    </div>`;
    return `<li class="mw-rec mw-wheel" data-row="${escAttr(id)}">
      <div class="mw-rec-summary" data-toggle="${escAttr(id)}">
        ${tickerEl}
        ${actionPill(r.verdict, "sm")}
        ${confHtml}
        ${cspStr}
        ${yieldStr}
        ${erWarn}
        <span class="mw-caret" aria-hidden="true">v</span>
      </div>
      ${detail}
    </li>`;
  }).join("");
  return `<section class="mw-card mw-card-span-3 mw-rec-card">
    <div class="mw-card-head">
      <h3 class="mw-card-title">Wheel candidates</h3>
      <span class="mw-card-count">${rows.length} ideas · cash-secured puts</span>
    </div>
    <div class="mw-card-body">
      <p class="mw-wheel-explainer">
        Stocks suitable for the wheel: sell a cash-secured put, get paid premium today, take assignment if the price falls below the strike, then sell covered calls until called away. Best on names you'd be happy to own at the strike with no earnings inside the trade window.
      </p>
      <ul class="mw-rec-list">${items}</ul>
    </div>
  </section>`;
}

function renderOptionsPane(b) {

    const id = `u-${r.ticker}`;

    title: "Unusual flow", count: o.unusual.length, span: "2",

      ${tickerPill(e.ticker, "sm")}
      <span class="mw-cal-event mw-dim">${escHtml(e.note || "")}${caret(hasDetail(e))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(e));
  }).join("");
  const eiv = card({
    title: `Earnings · ${abbr("IV")} elevated`, count: o.earnings_iv.length,
    body: o.earnings_iv.length ? `<ul class="mw-cal">${eivRows}</ul>` : `<p class="mw-empty">None this week.</p>`

  const lpRows = o.leaps.map((l, i) => {

      <span class="mw-cal-event">${escHtml(l.note || "")}${caret(hasDetail(l))}</span>
    </div>`;

  }).join("");
  const leaps = card({
    title: abbr("LEAPS"), span: "3",

  });

  const wheel = renderWheelCandidates(o.wheel_candidates, sparks);
  const recs = renderRecommendations(o.recommendations, "options", sparks);
  const social = renderSocial(o.social, "options", "Options");

  const intro = renderTabIntro(o.tab_intro, "options");
  const actions = renderPerTabActions(o.actions);
  // Order: headlines, today's actions, top picks, LEAPs, wheel candidates,
  // rest (unusual flow + earnings IV + social chatter).
  return `${intro}${actions}${recs}${leaps}${wheel}<div class="mw-grid">${unusual}${eiv}${social}</div>`;
}

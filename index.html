<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Watch</title>
  <meta name="description" content="Daily market briefs: macro, stocks, options, crypto. Not investment advice.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="mw-page" id="root">
    <p class="mw-empty">Loading the latest brief.</p>
  </div>

<script>
"use strict";

// ============================================================
//  GLOSSARY
// ============================================================
const GLOSSARY = {
  "RSI": "Relative Strength Index. Above 70 is stretched, below 30 is oversold. A momentum gauge, not a timing signal.",
  "VIX": "S&P 500 30-day implied volatility. Below 15 calm, 15 to 20 normal, 20 to 30 elevated, 30+ fearful.",
  "MA": "Moving Average. The N-day average closing price. Trend reference.",
  "20MA": "20-day moving average. Short-term trend reference. Price too far above is statistically late.",
  "ATR": "Average True Range. Average daily price swing, used to size stops.",
  "FOMO ceiling": "Price more than 2 ATR above the 20MA. Entries above it are statistically late.",
  "DXY": "US Dollar Index versus a basket of major currencies. Rising DXY pressures stocks and commodities.",
  "10Y": "10-year Treasury yield. Rising yields tend to pressure long-duration tech.",
  "V/OI": "Volume divided by Open Interest. Above 1 is fresh positioning, not roll activity.",
  "vol/OI": "Same as V/OI. Above 1 means today's volume far exceeds existing open contracts.",
  "IV": "Implied Volatility. The market's forward vol estimate baked into option prices. Spikes pre-earnings.",
  "LEAP": "Long-dated option, expiry typically 9+ months out. For multi-quarter directional theses.",
  "LEAPS": "Long-dated options. Expiry over 9 months out.",
  "PEAD": "Post-Earnings Announcement Drift. Beats tend to keep drifting in the surprise direction for weeks.",
  "ETF": "Exchange-Traded Fund. A basket of securities trading like a single stock.",
  "SPY": "S&P 500 ETF. The market's headline gauge.",
  "QQQ": "Nasdaq-100 ETF. Heavily tech-weighted.",
  "IWM": "Russell 2000 ETF. The small-cap, risk-on breadth read.",
  "XLE": "Energy Sector ETF.",
  "XLK": "Technology Sector ETF.",
  "XLV": "Health Care Sector ETF.",
  "XLU": "Utilities Sector ETF. Defensive, yield-oriented.",
  "XLY": "Consumer Discretionary Sector ETF.",
  "XLRE": "Real Estate Sector ETF.",
  "WSB": "r/WallStreetBets. High mention scores often correlate with squeezes and momentum chasing.",
  "ATH": "All-Time High.",
  "MoM": "Month over Month. Change versus prior month.",
  "JOLTS": "Job Openings and Labor Turnover Survey. Monthly US hiring read.",
  "ISM": "Institute for Supply Management. Above 50 expansion, below 50 contraction.",
  "BTC": "Bitcoin. The largest cryptocurrency.",
  "ETH": "Ethereum. Second-largest crypto, leading smart-contract platform.",
  "contango": "Futures curve sloping up. Later contracts cost more than nearer ones.",
};

// ============================================================
//  STATE
// ============================================================
let DATA = null;
let ACTIVE_BRIEF = null;
let TAB = "macro";
let OPEN_ID = null;
let MODAL = null;
let MODE = (function() {
  try { return localStorage.getItem("mw_detail_mode") || "plain"; }
  catch { return "plain"; }
})();

function setMode(m) {
  MODE = m;
  try { localStorage.setItem("mw_detail_mode", m); } catch {}
}

// ============================================================
//  HELPERS
// ============================================================
const escHtml = s => String(s == null ? "" : s)
  .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

const escAttr = s => escHtml(s);

function fmtNum(n, dp = 2) {
  if (n == null || isNaN(n)) return "-";
  if (Math.abs(n) >= 1000) return Number(n).toLocaleString("en-US", { maximumFractionDigits: dp });
  return Number(n).toFixed(dp);
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return "";
  const sign = n > 0 ? "+" : n < 0 ? "-" : "";
  return `${sign}${Math.abs(n).toFixed(2)}%`;
}

function pctClass(n) {
  if (n == null) return "";
  return n > 0 ? "is-up" : n < 0 ? "is-down" : "";
}

function abbr(term, label) {
  const def = GLOSSARY[term];
  const text = escHtml(label || term);
  if (!def) return text;
  return `<span class="mw-glossy" tabindex="0" data-tt="${escAttr(def)}">${text}</span>`;
}

function sparkSvg(data, w = 80, h = 22, sw = 1.25) {
  if (!data || data.length < 2) return "";
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const stepX = w / (data.length - 1);
  const pts = data.map((v, i) =>
    `${(i * stepX).toFixed(2)},${(h - (v - min) / range * h).toFixed(2)}`
  ).join(" ");
  const trend = data[data.length - 1] > data[0] ? "up"
              : data[data.length - 1] < data[0] ? "down" : "flat";
  return `<svg class="mw-spark mw-spark-${trend}" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <polyline fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>
  </svg>`;
}

function tickerPill(sym, size) {
  return `<span class="mw-tpill ${size === "sm" ? "mw-tpill-sm" : ""} mw-mono">${escHtml(sym)}</span>`;
}

function actionPill(verb, size) {
  const v = String(verb || "").toUpperCase();
  const tone = v.includes("WATCH") ? "watch"
             : v.includes("NO ACTION") || v === "NONE" ? "none"
             : v.includes("LONG") || v.includes("BUY") ? "long"
             : v.includes("SHORT") || v.includes("SELL") || v.includes("AVOID") ? "short"
             : v.includes("ACTION") ? "action"
             : v.includes("OPEN") ? "open"
             : v.includes("PRE-MARKET") || v.includes("AFTER-HOURS") ? "watch"
             : v.includes("CLOSED") ? "none"
             : v.includes("TRIM") || v.includes("HOLD") ? "neutral"
             : "neutral";
  return `<span class="mw-pill mw-pill-${tone} ${size === "sm" ? "mw-pill-sm" : ""}">${escHtml(v)}</span>`;
}

function statusDot(status) {
  const s = String(status || "FAR").toUpperCase();
  const map = {
    "TRIGGERED": "trig", "IN_ZONE": "in", "NEAR": "near",
    "FAR": "far", "INVALIDATED": "inv"
  };
  return `<span class="mw-status mw-status-${map[s] || "near"}">${s.replace(/_/g, " ")}</span>`;
}

function caret(present) {
  return present ? `<span class="mw-caret" aria-hidden="true">v</span>` : "";
}

// detail can be a plain string (legacy) or an object {plain, pro}.
function getDetail(item) {
  if (!item) return "";
  const d = item.detail;
  if (!d) return "";
  if (typeof d === "string") return d;
  if (typeof d === "object") return d[MODE] || d.plain || d.pro || "";
  return "";
}
function hasDetail(item) {
  if (!item) return false;
  const d = item.detail;
  if (!d) return false;
  if (typeof d === "string") return true;
  return !!(d.plain || d.pro);
}

// rec.action is similarly {plain, pro}
function getRecAction(rec) {
  if (!rec) return "";
  const a = rec.action;
  if (!a) return "";
  if (typeof a === "string") return a;
  return a[MODE] || a.plain || a.pro || "";
}

function isOpen(id) { return OPEN_ID === id; }

function expandLi(id, summary, detailHtml, extraClass) {
  const open = isOpen(id);
  const cls = `mw-li ${extraClass || ""} ${open ? "is-open" : ""} ${detailHtml ? "is-clickable" : ""}`.trim();
  const det = open && detailHtml ? `<div class="mw-li-detail">${detailHtml}</div>` : "";
  const handler = detailHtml ? `data-toggle="${escAttr(id)}"` : "";
  return `<li class="${cls}"><div class="mw-li-summary" ${handler}>${summary}</div>${det}</li>`;
}

function expandRow(id, cells, detailHtml, cols, extraClass) {
  const open = isOpen(id);
  const cls = `mw-row ${extraClass || ""} ${open ? "is-open" : ""} ${detailHtml ? "is-clickable" : ""}`.trim();
  const handler = detailHtml ? `data-toggle="${escAttr(id)}"` : "";
  const detRow = open && detailHtml
    ? `<tr class="mw-row-detail"><td colspan="${cols}"><div class="mw-detail-inner">${detailHtml}</div></td></tr>`
    : "";
  return `<tr class="${cls}" ${handler}>${cells}</tr>${detRow}`;
}

// Render the inline detail block — picks the right text based on MODE.
function renderDetail(item) {
  return hasDetail(item) ? escHtml(getDetail(item)) : null;
}

// ============================================================
//  DATA NORMALIZATION
// ============================================================
function normalize(brief) {
  const actions = (brief.top_actions || []).map(a => {
    if (typeof a === "object" && a !== null) {
      return {
        verb: a.verb || "WATCH",
        target: a.target || "",
        text: a.text || "",
        detail: a.detail || ""
      };
    }
    const s = String(a);
    let verb = "WATCH", rest = s;
    const m = s.match(/^(ACTION|WATCH|NO ACTION|NONE|LONG|SHORT)\s+(.*)$/i);
    if (m) { verb = m[1].toUpperCase(); rest = m[2]; }
    const t = rest.match(/^([A-Z]{2,6})\s+(.*)$/);
    let target = "", text = rest;
    if (t) { target = t[1]; text = t[2]; }
    return { verb, target, text, detail: "" };
  });

  const sr = brief.macro?.sector_rotation || {};
  const leaders = sr.leaders_5d || brief.macro?.leaders_5d || [];
  const laggards = sr.laggards_5d || brief.macro?.laggards_5d || [];
  const rotation_read = sr.read || brief.macro?.rotation_read || "";

  const watchlist = (brief.stocks?.watchlist || []).map(w => ({
    ticker: w.ticker,
    last: w.last,
    chg: w.chg ?? w.change_pct,
    zone: w.zone ?? w.trigger_zone,
    status: w.status,
    note: w.note,
    detail: w.detail
  }));

  const smart_money = brief.stocks?.smart_money || brief.stocks?.smart_money_clusters || [];

  // Headline can be a string (legacy) or {plain, pro} object.
  let headline = "";
  if (brief.headline) {
    if (typeof brief.headline === "string") headline = brief.headline;
    else if (typeof brief.headline === "object") {
      headline = brief.headline[MODE] || brief.headline.plain || brief.headline.pro || "";
    }
  }

  return {
    date: brief.date,
    updated: brief.updated_at || brief.last_refreshed_at,
    regime: brief.regime || "NEUTRAL",
    regime_note: brief.regime_note || "",
    headline,
    actions,
    market_status: brief.market_status,
    sparks: brief.sparks || {},
    macro: {
      indices: brief.macro?.indices || [],
      vol_yields: brief.macro?.vol_yields || {},
      leaders, laggards, rotation_read,
      events_14d: brief.macro?.events_14d || [],
      earnings_7d: brief.macro?.earnings_7d || [],
      action: brief.macro?.action,
      recommendations: brief.macro?.recommendations,
      social: brief.macro?.social || []
    },
    stocks: {
      watchlist,
      movers: brief.stocks?.movers || { gainers: [], losers: [] },
      smart_money,
      wsb_top: brief.stocks?.wsb_top || [],
      action: brief.stocks?.action,
      recommendations: brief.stocks?.recommendations,
      social: brief.stocks?.social || []
    },
    options: {
      unusual: brief.options?.unusual || [],
      earnings_iv: brief.options?.earnings_iv || [],
      leaps: brief.options?.leaps || [],
      action: brief.options?.action,
      recommendations: brief.options?.recommendations,
      social: brief.options?.social || []
    },
    crypto: { ...(brief.crypto || { status: "coming_soon" }), social: brief.crypto?.social || [] }
  };
}

// ============================================================
//  RENDER PIECES
// ============================================================
function renderMasthead(b) {
  const dt = b.date ? formatDate(b.date) : "";
  const upd = b.updated ? "Updated " + formatTime(b.updated) : "";
  const meta = [dt, upd].filter(Boolean).join(" · ");

  return `<header class="mw-masthead">
    <div class="mw-meta-row">
      <span class="mw-mono mw-meta-item">${escHtml(meta)}</span>
      <span class="mw-meta-spacer"></span>
      <div class="mw-mode-toggle" role="group" aria-label="Detail level">
        <button data-mode="plain" class="${MODE === 'plain' ? 'is-active' : ''}">Plain</button>
        <button data-mode="pro" class="${MODE === 'pro' ? 'is-active' : ''}">Pro</button>
      </div>
      <span class="mw-meta-dot">·</span>
      <button class="mw-meta-btn" data-modal="glossary">Glossary</button>
      <span class="mw-meta-dot">·</span>
      <button class="mw-meta-btn" data-modal="archive">Archive</button>
      <span class="mw-meta-dot">·</span>
      <a class="mw-meta-btn mw-meta-btn-accent" href="https://form.jotform.com/261215968266061" target="_blank" rel="noopener noreferrer">Feedback</a>
    </div>
    <p class="mw-tagline">The Daily Tape</p>
    <div class="mw-tagline-rule"></div>
    <h1 class="mw-wordmark">
      <span class="mw-wordmark-word">MARKET</span><span class="mw-wordmark-word">WATCH</span>
    </h1>
    <div class="mw-tagline-rule"></div>
    <div class="mw-regime-wrap">
      <span class="mw-regime-label">REGIME</span>
      <span class="mw-regime mw-regime-${b.regime}">${escHtml(b.regime)}</span>
      ${b.regime_note ? `<span class="mw-regime-note">· ${escHtml(b.regime_note)}</span>` : ""}
    </div>
    ${b.headline ? `<p class="mw-headline">${escHtml(b.headline)}</p>` : ""}
  </header>`;
}

function renderMarketStatus(s) {
  if (!s) return "";
  const tier = String(s.tier || "").toUpperCase();
  const cls = tier.includes("OPEN") ? "mw-mstatus-open"
            : tier.includes("PRE")  ? "mw-mstatus-pre"
            : tier.includes("AFTER") ? "mw-mstatus-post"
            : "mw-mstatus-closed";
  return `<div class="mw-mstatus ${cls}">
    ${actionPill(s.tier, "sm")}
    <span class="mw-mstatus-text">${escHtml(s.text || "")}</span>
  </div>`;
}

function renderTopActions(actions) {
  if (!actions || !actions.length) return "";
  const rows = actions.map((a, i) => {
    const id = `action-${i}`;
    const summary = `
      <span class="mw-mono mw-action-num">${String(i + 1).padStart(2, "0")}</span>
      ${actionPill(a.verb)}
      ${a.target ? tickerPill(a.target) : `<span></span>`}
      <span class="mw-action-text">${escHtml(a.text)}</span>
      ${caret(hasDetail(a))}`;
    return expandLi(id, summary, renderDetail(a), "mw-action-item");
  }).join("");
  return `<section class="mw-top-actions">
    <div class="mw-eyebrow">
      <span class="mw-eyebrow-mark mw-mono">&gt;</span>
      <span class="mw-eyebrow-text mw-mono">Today's actions</span>
      <span class="mw-eyebrow-rule"></span>
      <span class="mw-mono mw-eyebrow-count">${actions.length}</span>
    </div>
    <ul class="mw-action-list">${rows}</ul>
  </section>`;
}

const TABS = [
  { id: "macro",   label: "Macro",   kicker: "regime · vol · yields" },
  { id: "stocks",  label: "Stocks",  kicker: "watchlist · movers" },
  { id: "options", label: "Options", kicker: "unusual · IV · LEAPS" },
  { id: "crypto",  label: "Crypto",  kicker: "soon" },
];

function renderTabs(active) {
  return `<nav class="mw-tabs" role="tablist">${TABS.map(t => `
    <button class="mw-tab ${active === t.id ? "is-active" : ""}" role="tab" aria-selected="${active === t.id}" data-tab="${t.id}">
      <span class="mw-tab-label">${t.label}</span>
      <span class="mw-tab-kicker mw-mono">${t.kicker}</span>
    </button>`).join("")}</nav>`;
}

function card({ title, count, body, action, span }) {
  const head = `<div class="mw-card-head">
    <h3 class="mw-card-title">${title}</h3>
    ${count != null ? `<span class="mw-card-count">${count}</span>` : ""}
  </div>`;
  const foot = action ? `<div class="mw-card-footer mw-card-footer-${String(action.tier || "").toLowerCase().replace(/\s/g, "-")}">
      ${actionPill(action.tier, "sm")}
      <span class="mw-card-action-text">${escHtml(action.text || "")}</span>
    </div>` : "";
  return `<section class="mw-card ${span ? `mw-card-span-${span}` : ""}">${head}<div class="mw-card-body">${body}</div>${foot}</section>`;
}

// ──────────────── RECOMMENDATIONS ────────────────
function renderRecCard(rec, side, prefix) {
  const id = `rec-${prefix}-${side}-${rec.ticker.replace(/[^a-zA-Z0-9]/g, "_")}`;
  const conf = rec.confidence != null ? `${rec.confidence}` : "";
  const action = getRecAction(rec);
  const detailBlocks = `
    <div class="mw-rec-debate">
      <div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label is-up">Pros</span>
        <p class="mw-rec-debate-text">${escHtml(rec.pros || "")}</p>
      </div>
      <div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label is-down">Cons</span>
        <p class="mw-rec-debate-text">${escHtml(rec.cons || "")}</p>
      </div>
      ${action ? `<div class="mw-rec-debate-row">
        <span class="mw-rec-debate-label">${MODE === 'pro' ? 'Robinhood' : 'How to act'}</span>
        <p class="mw-rec-debate-text">${escHtml(action)}</p>
      </div>` : ""}
    </div>`;
  const open = isOpen(id);
  const cls = `mw-rec ${open ? "is-open" : ""}`;
  const handler = `data-toggle="${escAttr(id)}"`;
  return `<li class="${cls}">
    <div class="mw-rec-summary" ${handler}>
      <span class="mw-rec-tk">${escHtml(rec.ticker)}</span>
      ${actionPill(rec.verdict, "sm")}
      ${conf ? `<span class="mw-mono mw-rec-conf">${conf}</span>` : ""}
      ${rec.vehicle ? `<span class="mw-rec-vehicle mw-mono">${escHtml(rec.vehicle)}</span>` : ""}
      <span class="mw-rec-summary-text">${escHtml((rec.pros || "").split(".")[0])}.</span>
      <span class="mw-caret" aria-hidden="true">v</span>
    </div>
    ${open ? detailBlocks : ""}
  </li>`;
}

// ──────────────── SOCIAL SENTIMENT (per tab) ────────────────
function sentClass(s) {
  const v = String(s || "").toUpperCase();
  if (v === "BULLISH") return "is-up";
  if (v === "BEARISH") return "is-down";
  return "mw-dim";
}

function renderSocialItem(item, prefix) {
  const id = `soc-${prefix}-${item.ticker.replace(/[^a-zA-Z0-9]/g, "_")}`;
  const open = isOpen(id);
  const detailHtml = renderDetail(item);
  const cls = `mw-soc-row ${open ? "is-open" : ""} ${detailHtml ? "is-clickable" : ""}`;
  const handler = detailHtml ? `data-toggle="${escAttr(id)}"` : "";
  const sources = (item.sources || []).join(", ");
  const summary = (item.summary || "").trim();
  return `<li class="${cls}">
    <div class="mw-soc-summary" ${handler}>
      ${tickerPill(item.ticker, "sm")}
      <span class="mw-soc-mentions mw-mono">${item.mentions || 0}</span>
      <span class="mw-soc-sentiment ${sentClass(item.sentiment)} mw-mono">${escHtml(item.sentiment || "NEUTRAL")}</span>
      <span class="mw-soc-sources mw-mono">${escHtml(sources)}</span>
      ${caret(hasDetail(item))}
    </div>
    ${open && detailHtml ? `<div class="mw-soc-detail">${detailHtml}</div>` : ""}
  </li>`;
}

function renderSocial(socialItems, prefix, tabLabel) {
  if (!socialItems || !socialItems.length) return "";
  const body = `<ul class="mw-soc-list">${socialItems.map(s => renderSocialItem(s, prefix)).join("")}</ul>`;
  return `<section class="mw-card mw-card-span-3 mw-soc-card">
    <div class="mw-card-head">
      <h3 class="mw-card-title">Social chatter ${tabLabel ? "&middot; " + tabLabel : ""}</h3>
      <span class="mw-card-count">${socialItems.length} ${socialItems.length === 1 ? "ticker" : "tickers"}</span>
    </div>
    <div class="mw-card-body">
      <div class="mw-soc-head">
        <span class="mw-soc-h-tk">Ticker</span>
        <span class="mw-soc-h-mentions">Mentions</span>
        <span class="mw-soc-h-sent">Read</span>
        <span class="mw-soc-h-sources">Where</span>
      </div>
      ${body}
      <p class="mw-soc-foot">Pulled from r/wallstreetbets, r/stocks, r/all-stocks, r/cryptocurrency, r/TheRaceTo10Million, r/TheRaceTo1Million, r/Vitards, r/thetagang, r/Daytrading, r/options, and StockTwits trending.</p>
    </div>
  </section>`;
}

function renderRecommendations(recs, prefix) {
  if (!recs) return "";
  const buys = (recs.buy || []);
  const sells = (recs.sell || []);
  if (!buys.length && !sells.length) return "";

  const buyBody = buys.length
    ? `<ul class="mw-rec-list">${buys.map(r => renderRecCard(r, "buy", prefix)).join("")}</ul>`
    : `<p class="mw-empty-pad">No buy ideas with conviction today.</p>`;
  const sellBody = sells.length
    ? `<ul class="mw-rec-list">${sells.map(r => renderRecCard(r, "sell", prefix)).join("")}</ul>`
    : `<p class="mw-empty-pad">No sell ideas with conviction today.</p>`;

  return `<section class="mw-card mw-card-span-3 mw-rec-card">
    <div class="mw-card-head">
      <h3 class="mw-card-title">Top picks today</h3>
      <span class="mw-card-count">${buys.length} buy · ${sells.length} sell</span>
    </div>
    <div class="mw-card-body">
      <div class="mw-rec-grid">
        <div>
          <div class="mw-rec-head mw-rec-head-up">Best to buy</div>
          ${buyBody}
        </div>
        <div>
          <div class="mw-rec-head mw-rec-head-down">Best to sell or avoid</div>
          ${sellBody}
        </div>
      </div>
    </div>
  </section>`;
}

// ──────────────── MACRO ────────────────
function renderMacroPane(b) {
  const m = b.macro;
  const sparks = b.sparks || {};

  const idxRows = m.indices.map(r => {
    const id = `mi-${r.ticker}`;
    const spark = sparks[r.ticker] || [];
    const cells = `
      <td>${tickerPill(r.ticker)}</td>
      <td>${sparkSvg(spark, 88, 22)}</td>
      <td class="mw-mono r">${fmtNum(r.last)}</td>
      <td class="mw-mono r ${r.rsi > 70 ? "is-down" : r.rsi < 30 ? "is-up" : ""}">${r.rsi != null ? abbr("RSI", r.rsi.toFixed(1)) : "-"}</td>
      <td class="mw-dim">${escHtml(r.note || "")}${caret(hasDetail(r))}</td>`;
    return expandRow(id, cells, renderDetail(r), 5);
  }).join("");

  const indices = card({
    title: "Indices", count: m.indices.length, span: "2",
    body: `<table class="mw-table">
      <thead><tr><th>Ticker</th><th>14d</th><th class="r">Last</th><th class="r">RSI</th><th>Note</th></tr></thead>
      <tbody>${idxRows}</tbody>
    </table>`
  });

  const vy = m.vol_yields;
  const volRow = (label, val) => `<div><dt>${label}</dt><dd class="mw-mono">${val}</dd></div>`;
  const volBody = `<dl class="mw-kv">
    ${vy.vix != null ? volRow(abbr("VIX"), fmtNum(vy.vix)) : ""}
    ${vy.vix_term ? volRow("Term", `<span class="mw-dim">${escHtml(String(vy.vix_term).replace(/_/g, " ").toLowerCase())}</span>`) : ""}
    ${vy.ten_year != null ? volRow(abbr("10Y"), fmtNum(vy.ten_year) + "%") : ""}
    ${vy.dxy != null ? volRow(abbr("DXY"), fmtNum(vy.dxy)) : ""}
    ${vy.oil != null ? volRow("Oil", "$" + fmtNum(vy.oil)) : ""}
    ${vy.gold != null ? volRow("Gold", "$" + fmtNum(vy.gold)) : ""}
  </dl>`;
  const vol = card({ title: "Vol &amp; Yields", body: volBody });

  const rotRow = (s, dir) => {
    const id = `${dir}-${s.etf}`;
    const score = Number(s.score) || 0;
    const summary = `<div class="mw-rot-row">
      ${tickerPill(s.etf, "sm")}
      <span class="mw-rot-bar"><span class="mw-rot-fill ${score < 0 ? "mw-down" : "mw-up"}" style="width:${Math.min(Math.abs(score) * 5, 100)}%"></span></span>
      <span class="mw-mono ${score < 0 ? "is-down" : "is-up"}">${score > 0 ? "+" : ""}${score.toFixed(1)}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(s), "mw-rot-li");
  };
  const rot = card({
    title: "Sector rotation · 5d",
    body: `<div class="mw-rot">
      <div><div class="mw-rot-head">Leaders</div><ul class="mw-rot-list">${m.leaders.map(s => rotRow(s, "lead")).join("")}</ul></div>
      <div><div class="mw-rot-head">Laggards</div><ul class="mw-rot-list">${m.laggards.map(s => rotRow(s, "lag")).join("")}</ul></div>
    </div>${m.rotation_read ? `<p class="mw-rot-read">${escHtml(m.rotation_read)}</p>` : ""}`
  });

  const calRows = m.events_14d.map((e, i) => {
    const id = `cal-${i}`;
    const summary = `<div class="mw-cal-row">
      <span class="mw-mono mw-cal-date">${escHtml(e.date)}</span>
      <span class="mw-cal-event">${escHtml(e.event || "")}${caret(hasDetail(e))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(e));
  }).join("");
  const cal = card({
    title: "Calendar · 14d", count: m.events_14d.length, span: "2",
    body: m.events_14d.length ? `<ul class="mw-cal">${calRows}</ul>` : `<p class="mw-empty">No flagged events.</p>`
  });

  const earRows = m.earnings_7d.map(e => {
    const id = `ear-${e.ticker}`;
    const summary = `<div class="mw-cal-row mw-cal-row-3">
      <span class="mw-mono mw-cal-date">${escHtml(e.date)}</span>
      ${tickerPill(e.ticker, "sm")}
      <span class="mw-cal-event mw-dim">${escHtml(e.note || "")}${caret(hasDetail(e))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(e));
  }).join("");
  const ear = card({
    title: "Earnings · 7d", count: m.earnings_7d.length,
    body: m.earnings_7d.length ? `<ul class="mw-cal">${earRows}</ul>` : `<p class="mw-empty">None within 7 days.</p>`
  });

  const macroAction = m.action ? `<section class="mw-card mw-card-span-3" style="padding:0">
    <div class="mw-card-footer mw-card-footer-${String(m.action.tier || "").toLowerCase().replace(/\s/g, "-")}" style="margin:0">
      ${actionPill(m.action.tier, "sm")}
      <span class="mw-card-action-text">${escHtml(m.action.text || "")}</span>
    </div>
  </section>` : "";

  const recs = renderRecommendations(m.recommendations, "macro");
  const social = renderSocial(m.social, "macro", "Macro");

  return `<div class="mw-grid">${indices}${vol}${rot}${cal}${ear}${macroAction}${recs}${social}</div>`;
}

// ──────────────── STOCKS ────────────────
function renderStocksPane(b) {
  const s = b.stocks;
  const sparks = b.sparks || {};

  const wlRows = s.watchlist.map(w => {
    const id = `w-${w.ticker}`;
    const klass = String(w.status).toUpperCase() === "INVALIDATED" ? "is-strike" : "";
    const cells = `
      <td>${tickerPill(w.ticker)}</td>
      <td>${sparkSvg(sparks[w.ticker] || [])}</td>
      <td class="mw-mono r">${fmtNum(w.last)}</td>
      <td class="mw-mono r ${pctClass(w.chg)}">${fmtPct(w.chg)}</td>
      <td class="mw-mono mw-trigger">${abbr("FOMO ceiling", w.zone || "")}</td>
      <td>${statusDot(w.status)}</td>
      <td class="mw-dim">${escHtml(w.note || "")}${caret(hasDetail(w))}</td>`;
    return expandRow(id, cells, renderDetail(w), 7, klass);
  }).join("");

  const watchlist = card({
    title: "Watchlist · Triggers", count: s.watchlist.length, span: "3",
    body: `<table class="mw-table mw-table-watch">
      <thead><tr><th>Ticker</th><th>14d</th><th class="r">Last</th><th class="r">&Delta;</th><th>Trigger</th><th>Status</th><th>Note</th></tr></thead>
      <tbody>${wlRows}</tbody>
    </table>`
  });

  const moverRow = (r, dir) => {
    const id = `mv-${dir}-${r.ticker}`;
    const summary = `<div class="mw-mover-row">
      ${tickerPill(r.ticker)}
      ${sparkSvg(r.spark || [], 70, 22, 1.5)}
      <span class="mw-mono mw-mover-pct ${dir === "up" ? "is-up" : "is-down"}">${fmtPct(r.chg)}</span>
      <span class="mw-mono mw-mover-last">${fmtNum(r.last)}</span>
      <span class="mw-mover-note">${escHtml(r.note || "")}${caret(hasDetail(r))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(r));
  };
  const movers = card({
    title: "Big movers · 5d",
    count: (s.movers.gainers.length || 0) + (s.movers.losers.length || 0),
    span: "3",
    body: `<div class="mw-movers">
      <div class="mw-movers-col">
        <div class="mw-movers-head mw-movers-head-up">Gainers</div>
        <ul class="mw-mover-list">${s.movers.gainers.length ? s.movers.gainers.map(r => moverRow(r, "up")).join("") : `<li class="mw-empty-pad">No gainers in scan.</li>`}</ul>
      </div>
      <div class="mw-movers-col">
        <div class="mw-movers-head mw-movers-head-down">Losers</div>
        <ul class="mw-mover-list">${s.movers.losers.length ? s.movers.losers.map(r => moverRow(r, "down")).join("") : `<li class="mw-empty-pad">No losers in scan.</li>`}</ul>
      </div>
    </div>`
  });

  const sm = card({
    title: "Smart-money clusters", count: s.smart_money.length,
    body: s.smart_money.length
      ? `<div class="mw-chips">${s.smart_money.map(t => tickerPill(t, "sm")).join("")}</div>`
      : `<p class="mw-empty">No clusters today.</p>`
  });

  const wsbTop = s.wsb_top || [];
  const wsbMax = wsbTop.reduce((a, b) => Math.max(a, b.score || 0), 1) || 1;
  const wsbRows = wsbTop.map((r, i) => `<li class="mw-rank-row">
    <span class="mw-mono mw-rank-i">${String(i + 1).padStart(2, "0")}</span>
    ${tickerPill(r.ticker, "sm")}
    <span class="mw-rank-bar"><span class="mw-rank-fill" style="width:${Math.min(100, (r.score || 0) / wsbMax * 100)}%"></span></span>
    <span class="mw-mono mw-dim">${r.score || 0}</span>
  </li>`).join("");
  const wsb = card({
    title: `${abbr("WSB")} · top ${wsbTop.length || 5}`,
    body: wsbTop.length ? `<ul class="mw-rank">${wsbRows}</ul>` : `<p class="mw-empty">No WSB data.</p>`
  });

  const statusCounts = ["IN_ZONE", "TRIGGERED", "NEAR", "FAR", "INVALIDATED"].map(st => ({
    st, n: s.watchlist.filter(w => String(w.status).toUpperCase() === st).length
  })).filter(x => x.n > 0);
  const mix = card({
    title: "Status mix",
    body: statusCounts.length ? `<ul class="mw-statmix">${statusCounts.map(x => `
      <li class="mw-statmix-row">${statusDot(x.st)}<span class="mw-mono mw-statmix-n">${x.n}</span></li>
    `).join("")}</ul>` : `<p class="mw-empty">No watchlist activity.</p>`
  });

  const stocksAction = s.action ? `<section class="mw-card mw-card-span-3" style="padding:0">
    <div class="mw-card-footer mw-card-footer-${String(s.action.tier || "").toLowerCase().replace(/\s/g, "-")}" style="margin:0">
      ${actionPill(s.action.tier, "sm")}
      <span class="mw-card-action-text">${escHtml(s.action.text || "")}</span>
    </div>
  </section>` : "";

  const recs = renderRecommendations(s.recommendations, "stocks");
  const social = renderSocial(s.social, "stocks", "Stocks");

  return `<div class="mw-grid">${watchlist}${movers}${sm}${wsb}${mix}${stocksAction}${recs}${social}</div>`;
}

// ──────────────── OPTIONS ────────────────
function renderOptionsPane(b) {
  const o = b.options;

  const uRows = o.unusual.map(r => {
    const id = `u-${r.ticker}`;
    const cells = `
      <td>${tickerPill(r.ticker)}</td>
      <td class="mw-mono r">${r.vol_oi != null ? abbr("vol/OI", r.vol_oi + "x") : "-"}</td>
      <td class="mw-dim">${escHtml(r.context || "")}${caret(hasDetail(r))}</td>`;
    return expandRow(id, cells, renderDetail(r), 3);
  }).join("");
  const unusual = card({
    title: "Unusual flow", count: o.unusual.length, span: "2",
    body: o.unusual.length ? `<table class="mw-table">
      <thead><tr><th>Ticker</th><th class="r">${abbr("vol/OI", "Vol/OI")}</th><th>Context</th></tr></thead>
      <tbody>${uRows}</tbody>
    </table>` : `<p class="mw-empty">No unusual flow today.</p>`
  });

  const eivRows = o.earnings_iv.map(e => {
    const id = `eiv-${e.ticker}`;
    const summary = `<div class="mw-cal-row mw-cal-row-3">
      <span class="mw-mono mw-cal-date">${escHtml(e.date)}</span>
      ${tickerPill(e.ticker, "sm")}
      <span class="mw-cal-event mw-dim">${escHtml(e.note || "")}${caret(hasDetail(e))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(e));
  }).join("");
  const eiv = card({
    title: `Earnings · ${abbr("IV")} elevated`, count: o.earnings_iv.length,
    body: o.earnings_iv.length ? `<ul class="mw-cal">${eivRows}</ul>` : `<p class="mw-empty">None this week.</p>`
  });

  const lpRows = o.leaps.map((l, i) => {
    const id = `leap-${i}`;
    const summary = `<div style="display:flex;align-items:baseline;gap:10px;padding:8px 0">
      ${tickerPill(l.ticker, "sm")}
      <span class="mw-dim mw-mono" style="font-size:11px">${escHtml(l.thesis_window || "")}</span>
      <span class="mw-cal-event">${escHtml(l.note || "")}${caret(hasDetail(l))}</span>
    </div>`;
    return expandLi(id, summary, renderDetail(l));
  }).join("");
  const leaps = card({
    title: abbr("LEAPS"), span: "3",
    body: o.leaps.length ? `<ul class="mw-cal">${lpRows}</ul>` : `<p class="mw-empty-pad">No LEAP setups today.</p>`
  });

  const optAction = o.action ? `<section class="mw-card mw-card-span-3" style="padding:0">
    <div class="mw-card-footer mw-card-footer-${String(o.action.tier || "").toLowerCase().replace(/\s/g, "-")}" style="margin:0">
      ${actionPill(o.action.tier, "sm")}
      <span class="mw-card-action-text">${escHtml(o.action.text || "")}</span>
    </div>
  </section>` : "";

  const recs = renderRecommendations(o.recommendations, "options");
  const social = renderSocial(o.social, "options", "Options");

  return `<div class="mw-grid">${unusual}${eiv}${leaps}${optAction}${recs}${social}</div>`;
}

// ──────────────── CRYPTO ────────────────
function renderCryptoPane(b) {
  const c = b.crypto;
  const recs = renderRecommendations(c.recommendations, "crypto");
  const social = renderSocial(c.social, "crypto", "Crypto");
  if (c.status === "coming_soon" || !c.coins || !c.coins.length) {
    return `<div class="mw-grid">${card({
      title: "Crypto", span: "3",
      body: `<div class="mw-soon">
        <span class="mw-soon-tag">COMING SOON</span>
        <p class="mw-soon-text">${escHtml(c.note || "Crypto regime tracking begins after a few weeks of data collection.")}</p>
        <div class="mw-soon-list">
          ${tickerPill("BTC", "sm")} ${tickerPill("ETH", "sm")} ${tickerPill("SOL", "sm")} ${tickerPill("XRP", "sm")}
        </div>
      </div>`
    })}${recs}${social}</div>`;
  }
  const rows = c.coins.map(co => `<div class="mw-cal-row mw-cal-row-3" style="border-bottom:1px solid var(--mw-rule)">
    ${tickerPill(co.symbol, "sm")}
    <span class="mw-mono r">$${fmtNum(co.last)}</span>
    <span class="mw-mono ${pctClass(co.change_5d_pct)}">${fmtPct(co.change_5d_pct)} <span class="mw-dim">5d</span></span>
  </div>`).join("");
  return `<div class="mw-grid">${card({ title: "Crypto · levels", span: "3", body: rows, action: c.action })}${recs}${social}</div>`;
}

// ──────────────── MODALS ────────────────
function renderModal() {
  if (!MODAL) return "";
  if (MODAL === "archive") {
    const others = (DATA.briefs || []).filter(b => b.date !== ACTIVE_BRIEF.date);
    const items = others.map(b => `<li class="mw-archive-item" data-archive-date="${escAttr(b.date)}">
      <span class="mw-archive-date">${escHtml(formatDate(b.date))}</span>
      <span class="mw-regime mw-regime-sm mw-regime-${escHtml(b.regime || "NEUTRAL")}">${escHtml(b.regime || "-")}</span>
      <span class="mw-archive-headline">${escHtml(b.headline || "")}</span>
    </li>`).join("");
    return modalShell("Archive", `${others.length} prior briefs.`,
      others.length ? `<ul class="mw-archive-list">${items}</ul>` : `<p class="mw-empty">No prior briefs yet.</p>`);
  }
  if (MODAL === "glossary") {
    const entries = Object.entries(GLOSSARY).sort((a, b) => a[0].localeCompare(b[0]));
    return modalShell("Glossary", "Hover any underlined term in the brief to see this inline.", `
      <dl class="mw-glossary-list">${entries.map(([k, v]) => `
        <div class="mw-glossary-row">
          <dt class="mw-glossary-term">${escHtml(k)}</dt>
          <dd class="mw-glossary-def">${escHtml(v)}</dd>
        </div>`).join("")}</dl>`);
  }
  return "";
}

function modalShell(title, intro, body) {
  return `<div class="mw-overlay" data-modal-close>
    <div class="mw-modal">
      <div class="mw-modal-head">
        <h2 class="mw-modal-title">${escHtml(title)}</h2>
        <button class="mw-modal-close" data-modal-close aria-label="Close">x</button>
      </div>
      ${intro ? `<p class="mw-modal-intro">${escHtml(intro)}</p>` : ""}
      ${body}
    </div>
  </div>`;
}

// ──────────────── DATE HELPERS ────────────────
function formatDate(s) {
  if (!s) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y, m, d] = s.split("-").map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric", year: "numeric" });
  }
  return s;
}

function formatTime(s) {
  if (!s) return "";
  try {
    const dt = new Date(s);
    if (isNaN(dt)) return s;
    return dt.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  } catch { return s; }
}

// ============================================================
//  RENDER + EVENTS
// ============================================================
function render() {
  const root = document.getElementById("root");
  if (!ACTIVE_BRIEF) {
    root.innerHTML = `<p class="mw-empty">No brief loaded.</p>`;
    return;
  }
  const b = normalize(ACTIVE_BRIEF);

  let pane = "";
  if (TAB === "macro")   pane = renderMacroPane(b);
  if (TAB === "stocks")  pane = renderStocksPane(b);
  if (TAB === "options") pane = renderOptionsPane(b);
  if (TAB === "crypto")  pane = renderCryptoPane(b);

  root.innerHTML = `
    ${renderMasthead(b)}
    ${renderMarketStatus(b.market_status)}
    ${renderTopActions(b.actions)}
    ${renderTabs(TAB)}
    <main class="mw-main">${pane}</main>
    <footer class="mw-footer">
      <div class="mw-footer-rule"></div>
      <p class="mw-footer-text">Not investment advice.</p>
    </footer>
    ${renderModal()}
  `;
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll(".mw-tab").forEach(b =>
    b.addEventListener("click", () => { TAB = b.dataset.tab; OPEN_ID = null; render(); }));
  document.querySelectorAll("[data-toggle]").forEach(el =>
    el.addEventListener("click", e => {
      const id = el.dataset.toggle;
      OPEN_ID = OPEN_ID === id ? null : id;
      render();
    }));
  document.querySelectorAll("[data-modal]").forEach(b =>
    b.addEventListener("click", () => { MODAL = b.dataset.modal; render(); }));
  document.querySelectorAll("[data-modal-close]").forEach(b =>
    b.addEventListener("click", e => { if (e.target === b) { MODAL = null; render(); } }));
  document.querySelectorAll("[data-mode]").forEach(b =>
    b.addEventListener("click", () => { setMode(b.dataset.mode); render(); }));
  document.querySelectorAll(".mw-archive-item").forEach(item =>
    item.addEventListener("click", () => {
      const d = item.dataset.archiveDate;
      const found = (DATA.briefs || []).find(x => x.date === d);
      if (found) { ACTIVE_BRIEF = found; MODAL = null; TAB = "macro"; OPEN_ID = null; render(); window.scrollTo({ top: 0, behavior: "smooth" }); }
    }));
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && MODAL) { MODAL = null; render(); }
});

// ============================================================
//  BOOT
// ============================================================
fetch("briefs.json", { cache: "no-store" })
  .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
  .then(data => {
    DATA = data;
    const briefs = (data.briefs || []).slice().sort((a, b) => b.date.localeCompare(a.date));
    DATA.briefs = briefs;
    ACTIVE_BRIEF = briefs[0] || null;
    render();
  })
  .catch(err => {
    document.getElementById("root").innerHTML = `<p class="mw-empty">Could not load briefs: ${escHtml(err)}</p>`;
    console.error(err);
  });
</script>

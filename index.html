// ──────────────── MODALS ────────────────
function renderModal() {
  if (!MODAL) return "";
  if (MODAL === "archive") {
    const others = (DATA.briefs || []).filter(b => b.date !== ACTIVE_BRIEF.date);
    const items = others.map(b => `<li class="mw-archive-item" data-archive-date="${escAttr(b.date)}">
      <span class="mw-archive-date">${escHtml(formatDate(b.date))}</span>
      <span class="mw-regime mw-regime-sm mw-regime-${escHtml(b.regime || "NEUTRAL")}">${escHtml(b.regime || "-")}</span>
      <span class="mw-archive-headline">${escHtml(b.regime_note || "")}</span>
    </li>`).join("");
    return modalShell("Archive", `${others.length} prior briefs.`,
      others.length ? `<ul class="mw-archive-list">${items}</ul>` : `<p class="mw-empty">No prior briefs yet.</p>`);
  }
  if (MODAL === "glossary") {
    return modalShell("Glossary", "Hover any underlined term in the brief to see this inline.",
      `<dl class="mw-glossary-list">${GLOSSARY_HTML}</dl>`);
  }
  if (MODAL === "feedback") {
    return modalShell("Feedback",
      "Bug, missing ticker, or layout note. Email is optional but lets us reply.",
      `<form id="mw-feedback-form" class="mw-feedback-form" novalidate>
        <label class="mw-feedback-label" for="mw-fb-email">Email (optional)</label>
        <input class="mw-feedback-input" id="mw-fb-email" name="email" type="email" autocomplete="email">
        <label class="mw-feedback-label" for="mw-fb-message">Message</label>
        <textarea class="mw-feedback-input" id="mw-fb-message" name="message" rows="5" required placeholder="What's off, missing, or could be better?"></textarea>
        <input type="hidden" name="page" value="market-watch">
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;">
        <div class="mw-feedback-row">
          <button type="submit" class="mw-feedback-send">Send</button>
          <span class="mw-feedback-status" aria-live="polite"></span>
        </div>
      </form>`);
  }
  return "";
}

// Formspree submission: AJAX so the user stays on the page.
async function submitFeedback(form) {
  const status = form.querySelector(".mw-feedback-status");
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  status.textContent = "Sending...";
  status.className = "mw-feedback-status";
  try {
    const res = await fetch("https://formspree.io/f/xdabeoyz", {
      method: "POST",
      body: new FormData(form),
      headers: { "Accept": "application/json" }
    });
    if (res.ok) {
      form.innerHTML = `<p class="mw-feedback-thanks">Thanks. Logged.</p>`;
      return;
    }
    let msg = "Send failed. Try again.";
    try {
      const json = await res.json();
      if (json && json.errors && json.errors.length) {
        msg = json.errors.map(e => e.message || "").filter(Boolean).join(" ") || msg;
      }
    } catch {}
    status.textContent = msg;
    status.classList.add("is-down");
    btn.disabled = false;
  } catch (err) {
    status.textContent = "Network error. Try again.";
    status.classList.add("is-down");
    btn.disabled = false;
  }
}

document.addEventListener("submit", e => {
  if (e.target && e.target.id === "mw-feedback-form") {
    e.preventDefault();
    submitFeedback(e.target);
  }
});

function modalShell(title, intro, body) {
  return `<div class="mw-overlay" data-modal-close>
    <div class="mw-modal">
      <div class="mw-modal-head">
        <h2 class="mw-modal-title">${escHtml(title)}</h2>
        <button class="mw-modal-close" data-modal-close aria-label="Close">x</button>
      </div>
      ${intro ? `<p class="mw-modal-intro">${escHtml(intro)}</p>` : ""}
      ${body}
    </div>
  </div>`;
}

// ──────────────── DATE HELPERS ────────────────
function formatDate(s) {
  if (!s) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y, m, d] = s.split("-").map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric", year: "numeric" });
  }
  return s;
}

function formatTime(s) {
  if (!s) return "";
  try {
    const dt = new Date(s);
    if (isNaN(dt)) return s;
    return dt.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  } catch { return s; }
}

// Wall-clock helpers for the dynamic "today" label in the masthead.
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}
function todayString() {
  return new Date().toLocaleDateString("en-US", {
    weekday: "long", month: "short", day: "numeric", year: "numeric"
  });
}

// Read string-or-{plain,pro} text per the active MODE.
function pickModeText(v) {
  if (v == null) return "";
  if (typeof v === "string") return v;
  if (typeof v === "object") return v[MODE] || v.plain || v.pro || "";
  return "";
}

// ============================================================
//  RENDER + EVENTS — single mount, then targeted DOM updates
// ============================================================
const PANE_CACHE = new Map();             // key "${tab}|${MODE}" -> html string
let NORMALIZED = null;
let NORMALIZED_REF = null;

function getNormalized() {
  if (NORMALIZED_REF !== ACTIVE_BRIEF) {
    NORMALIZED = normalize(ACTIVE_BRIEF);
    NORMALIZED_REF = ACTIVE_BRIEF;
    CURRENT_SPARKS = NORMALIZED.sparks || {};
    CURRENT_HISTORY_1Y = NORMALIZED.history_1y || {};
    PANE_CACHE.clear();
  }
  return NORMALIZED;
}

function paneHtmlFor(tab) {
  const key = tab + "|" + MODE;
  let html = PANE_CACHE.get(key);
  if (html === undefined) {
    const b = getNormalized();
    if (tab === "macro")        html = renderMacroPane(b);
    else if (tab === "stocks")  html = renderStocksPane(b);
    else if (tab === "options") html = renderOptionsPane(b);
    else if (tab === "crypto")  html = renderCryptoPane(b);
    else html = "";
    PANE_CACHE.set(key, html);
  }
  return html;
}

// Re-render the masthead if the wall-clock date has rolled over (i.e. the
// page has been open across midnight). Cheap one-minute interval, no churn.
let _lastTodayKey = todayISO();
function maybeRefreshDate() {
  const t = todayISO();
  if (t === _lastTodayKey) return;
  _lastTodayKey = t;
  if (!ACTIVE_BRIEF) return;
  const masthead = document.getElementById("mw-masthead");
  if (masthead) masthead.innerHTML = renderMasthead(getNormalized());
}

// Initial mount: build the page DOM once. After this, all interactions are
// targeted updates (class toggles, single-section innerHTML swaps).
function mount() {
  const root = document.getElementById("root");
  if (!ACTIVE_BRIEF) {
    root.innerHTML = `<p class="mw-empty">No brief loaded.</p>`;
    return;
  }
  const b = getNormalized();
  // Each section wrapped to prevent one broken renderer from killing the
  // whole shell (which would also prevent tab switches from working since
  // the click listener attaches AFTER innerHTML).
  const tryRender = (fn, label) => {
    try { return fn(); }
    catch (err) { console.error(`${label} render failed:`, err); return ""; }
  };
  root.innerHTML = `
    <div id="mw-shell">
      <div id="mw-masthead">${tryRender(() => renderMasthead(b), "masthead")}</div>
      <div id="mw-tabs">${tryRender(() => renderTabs(TAB), "tabs")}</div>
      <div id="mw-mstatus">${tryRender(() => renderMarketStatus(b.market_status), "mstatus")}</div>
      <main id="mw-main" class="mw-main">${tryRender(() => paneHtmlFor(TAB), "pane:" + TAB)}</main>
      <footer class="mw-footer">
        <div class="mw-footer-rule"></div>
        <p class="mw-footer-text">Not investment advice.</p>
      </footer>
    </div>
    <div id="mw-modal-host"></div>
  `;
  // Single delegated click handler at root.
  root.addEventListener("click", onRootClick);
  // Tick every minute to catch midnight rollover so the date stays accurate.
  setInterval(maybeRefreshDate, 60 * 1000);
  // Trap browser back button + edge-swipe so the user stays in-app.
  installBackTrap();
}

// One click handler. Walk closest-by-attribute to find the action.
function onRootClick(e) {
  const t = e.target;
  let el;

  // Modal close (overlay click or close button)
  el = t.closest("[data-modal-close]");
  if (el && (t === el || t.classList.contains("mw-overlay") || t.classList.contains("mw-modal-close"))) {
    closeModal();
    return;
  }

  el = t.closest("[data-tab]");
  if (el) { showTab(el.dataset.tab); return; }

  el = t.closest("[data-toggle]");
  if (el) { toggleDetail(el.dataset.toggle); return; }

  el = t.closest("[data-modal]");
  if (el) { openModal(el.dataset.modal); return; }

  el = t.closest("[data-mode]");
  if (el) { setMode(el.dataset.mode); return; }

  el = t.closest("[data-theme-pref]");
  if (el) { setTheme(el.dataset.themePref); return; }

  if (t.closest("#mw-settings-btn")) { toggleSettings(); return; }
  if (!t.closest("#mw-settings-pop")) { toggleSettings(true); }

  el = t.closest("[data-archive-date]");
  if (el) { selectArchive(el.dataset.archiveDate); return; }
}

function showTab(name) {
  // Always scroll to top on tab tap, including when re-tapping the current
  // tab (acts as a "back to top" gesture, matching native iOS behavior).
  try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch { window.scrollTo(0, 0); }
  if (TAB === name) return;
  // Push a history entry per tab change so the back gesture walks tab-by-tab.
  // SUPPRESS_HISTORY is set when this call is itself driven by a popstate
  // (we're restoring tab state, not advancing it).
  if (!SUPPRESS_HISTORY) {
    try { history.pushState({ mwApp: true, kind: "tab", tab: name }, ""); } catch {}
  }
  TAB = name;
  // Update pill state on tab buttons in place.
  const tabs = document.querySelectorAll("#mw-tabs .mw-tab");
  tabs.forEach(b => {
    const active = b.dataset.tab === name;
    b.classList.toggle("is-active", active);
    b.setAttribute("aria-selected", String(active));
  });
  let html;
  try { html = paneHtmlFor(name); }
  catch (err) {
    console.error("paneHtmlFor failed:", err);
    html = `<p class="mw-empty">Could not render ${name}: ${escHtml(err.message || String(err))}</p>`;
  }
  const main = document.getElementById("mw-main");
  if (main) main.innerHTML = html;
  OPEN_ID = null;
}

function setMode(m) {
  if (MODE === m) return;
  MODE = m;
  try { localStorage.setItem("mw_detail_mode", m); } catch {}
  PANE_CACHE.clear();   // detail strings depend on MODE
  // Update mode toggle buttons
  document.querySelectorAll("[data-mode]").forEach(b =>
    b.classList.toggle("is-active", b.dataset.mode === m));
  // Mode-sensitive parts: masthead and the current pane (which carries
  // per-tab Today's Actions, top picks, intros, etc.).
  const b = getNormalized();
  const masthead = document.getElementById("mw-masthead");
  if (masthead) masthead.innerHTML = renderMasthead(b);
  document.getElementById("mw-main").innerHTML = paneHtmlFor(TAB);
  OPEN_ID = null;
}

// One detail open at a time. Toggle the .is-open class on every element with
// matching data-row (covers the summary row + detail row for tables, and the
// li/section wrapper for everything else). Detail visibility is driven by CSS.
//
// On phones (≤720px) we route to a full-screen mobile detail overlay instead
// of expanding inline. The overlay pushes a history state so the device's
// hardware back button (Android) and edge-swipe gesture (iOS) both close it.
function toggleDetail(id) {
  if (isMobileViewport()) {
    enterMobileDetail(id);
    return;
  }
  if (OPEN_ID && OPEN_ID !== id) {
    document.querySelectorAll('[data-row="' + cssEscape(OPEN_ID) + '"]')
      .forEach(el => el.classList.remove("is-open"));
  }
  const willOpen = OPEN_ID !== id;
  OPEN_ID = willOpen ? id : null;
  document.querySelectorAll('[data-row="' + cssEscape(id) + '"]')
    .forEach(el => el.classList.toggle("is-open", willOpen));
}

// ============================================================
//  MOBILE DETAIL OVERLAY (phones only)
//  Full-screen slide-in panel that hosts the row's expanded detail.
//  Wired into history.pushState so the device back button + edge swipe
//  close it without leaving the site.
// ============================================================
let MOBILE_DETAIL_OPEN = false;

function isMobileViewport() {
  return window.matchMedia && window.matchMedia("(max-width: 720px)").matches;
}

function findRowEls(id) {
  return Array.from(document.querySelectorAll('[data-row="' + cssEscape(id) + '"]'));
}

function findSummaryFor(id) {
  for (const el of findRowEls(id)) {
    const inner = el.querySelector('[data-toggle]');
    if (inner) return inner;
    if (el.matches('[data-toggle]')) return el;
  }
  return null;
}

function findDetailFor(id) {
  const els = findRowEls(id);
  const selectors = ['.mw-li-detail', '.mw-rec-debate', '.mw-soc-detail', '.mw-detail-inner'];
  for (const el of els) {
    for (const sel of selectors) {
      const d = el.querySelector(sel);
      if (d) return d;
    }
    // Table row case: .mw-row's detail lives in a sibling .mw-row-detail
    if (el.classList && el.classList.contains('mw-row')) {
      const sibling = el.nextElementSibling;
      if (sibling && sibling.classList && sibling.classList.contains('mw-row-detail')) {
        const inner = sibling.querySelector('.mw-detail-inner') || sibling;
        return inner;
      }
    }
  }
  return null;
}

function ensureDetailOverlay() {
  let ov = document.getElementById('mw-detail-overlay');
  if (ov) return ov;
  ov = document.createElement('div');
  ov.id = 'mw-detail-overlay';
  ov.className = 'mw-detail-overlay';
  ov.innerHTML = `
    <div class="mw-detail-bar">
      <button class="mw-detail-back" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Back</span>
      </button>
      <div class="mw-detail-title" id="mw-detail-title"></div>
      <div class="mw-detail-bar-spacer"></div>
    </div>
    <div class="mw-detail-content" id="mw-detail-content"></div>
  `;
  ov.querySelector('.mw-detail-back').addEventListener('click', () => exitMobileDetail());
  document.body.appendChild(ov);
  return ov;
}

function enterMobileDetail(id) {
  const summary = findSummaryFor(id);
  const detail = findDetailFor(id);
  if (!detail) return; // nothing to show; ignore the tap

  // Some detail rows opt out of the default summary-echo + chart hero (e.g.
  // the per-tab highlights overlay, where the row is a "Show N more" button
  // and echoing its label would be noise). They set data-overlay-title for
  // a meaningful header and data-overlay-no-echo to suppress the echo block.
  const rowEl = (findRowEls(id) || [])[0] || null;
  const overlayTitle = rowEl ? rowEl.getAttribute('data-overlay-title') : null;
  const noEcho = rowEl ? rowEl.hasAttribute('data-overlay-no-echo') : false;

  const ov = ensureDetailOverlay();
  document.getElementById('mw-detail-title').innerHTML = overlayTitle
    ? `<span class="mw-detail-title-text">${escHtml(overlayTitle)}</span>`
    : (summary ? summary.innerHTML : '');

  // Resolve the ticker (or proxy) symbol the chart should plot. Order:
  //   1. Explicit data-sym on the [data-row] (e.g. vol_yields rows pass
  //      "^VIX" so the chart loads from prices.json[^VIX] without showing
  //      the raw symbol in the title).
  //   2. .mw-tpill-sym text (watchlist, movers, recs, social).
  //   3. .mw-action-target-sym text (Today's Actions logo+name pattern).
  let sym = rowEl ? (rowEl.getAttribute('data-sym') || '') : '';
  if (!sym && summary) {
    const symEl = summary.querySelector('.mw-tpill-sym, .mw-action-target-sym');
    sym = symEl ? symEl.textContent.trim() : '';
  }
  // Prefer the persistent prices.json archive; fall back to the in-brief
  // history_1y while older briefs are still being served.
  let series = sym ? getPriceSeries(sym) : null;
  let closesOnly = null;
  if (!series && sym && CURRENT_HISTORY_1Y[sym]) {
    const arr = CURRENT_HISTORY_1Y[sym];
    if (arr && arr.length >= 2) closesOnly = arr;
  }

  // Robinhood-style hero panel: big ticker, current price, chart, scrub line.
  // Layout per phone spec: ticker name → chart → rest of content.
  let heroHtml = '';
  if (series && series.length >= 2) {
    const closes = series.map(p => Number(p[1]));
    const first = closes[0], last = closes[closes.length - 1];
    const pct = pctChange(first, last);
    const pctTxt = pct == null ? '' : (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
    const trendCls = pct == null ? '' : pct > 0 ? 'is-up' : pct < 0 ? 'is-down' : '';
    heroHtml = `
      <section class="mw-detail-hero" data-sym="${escAttr(sym)}">
        <div class="mw-hero-head">
          ${tickerLogo(sym)}<span class="mw-hero-sym mw-mono">${escHtml(sym)}</span>
        </div>
        <div class="mw-hero-prices">
          <span class="mw-hero-price mw-mono">$${last}</span>
          <span class="mw-hero-pct mw-mono ${trendCls}">${pctTxt}<span class="mw-hero-period">1Y</span></span>
        </div>
        ${priceChartSvg(closes, 320, 120)}
        <div class="mw-hero-scrub mw-mono">&nbsp;</div>
      </section>`;
  } else if (closesOnly) {
    const first = closesOnly[0], last = closesOnly[closesOnly.length - 1];
    const pct = pctChange(first, last);
    const pctTxt = pct == null ? '' : (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
    const trendCls = pct == null ? '' : pct > 0 ? 'is-up' : pct < 0 ? 'is-down' : '';
    heroHtml = `
      <section class="mw-detail-hero">
        <div class="mw-hero-head">
          ${tickerLogo(sym)}<span class="mw-hero-sym mw-mono">${escHtml(sym)}</span>
        </div>
        <div class="mw-hero-prices">
          <span class="mw-hero-price mw-mono">$${Math.round(last)}</span>
          <span class="mw-hero-pct mw-mono ${trendCls}">${pctTxt}<span class="mw-hero-period">1Y</span></span>
        </div>
        ${priceChartSvg(closesOnly, 320, 120)}
        <div class="mw-hero-scrub mw-mono">&nbsp;</div>
      </section>`;
  }

  document.getElementById('mw-detail-content').innerHTML = `
    ${heroHtml}
    ${noEcho ? '' : `<div class="mw-detail-summary-echo">${summary ? summary.innerHTML : ''}</div>`}
    <div class="mw-detail-body">${detail.innerHTML}</div>
  `;

  // Wire up touch-scrub on the chart (Robinhood-style finger crosshair).
  if (series && series.length >= 2) {
    const heroEl = document.querySelector('.mw-detail-hero');
    if (heroEl) attachChartScrub(heroEl, series);
  }

  // Push history state so back button works.
  if (!MOBILE_DETAIL_OPEN) {
    history.pushState({ mwDetail: true }, '', '');
  }
  MOBILE_DETAIL_OPEN = true;
  document.body.classList.add('mw-detail-locked');
  // Two RAFs let the browser apply the initial transform: translateX(100%)
  // before flipping the .is-open class triggers the slide-in transition.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ov.classList.add('is-open');
  }));
}

function exitMobileDetail(skipHistory) {
  const ov = document.getElementById('mw-detail-overlay');
  if (ov) ov.classList.remove('is-open');
  document.body.classList.remove('mw-detail-locked');
  if (MOBILE_DETAIL_OPEN && !skipHistory) {
    if (history.state && history.state.mwDetail) history.back();
  }
  MOBILE_DETAIL_OPEN = false;
}

// ============================================================
//  SPA back-button trap
//
//  The site is a single-page app, but the browser back button (and the
//  iOS edge-swipe / Mac trackpad swipe-back gesture, which both fire
//  popstate) would otherwise navigate the user off the site. We trap them:
//
//   - On boot, replace the current history entry with an "mwApp" home
//     state, then push a "trap" entry above it. This guarantees there's
//     always a same-origin entry behind the user, so back fires popstate
//     instead of unloading the page.
//   - showTab() pushes a tab-state on every change. Back walks tab-by-tab.
//   - Detail overlays push their own state (mwDetail). Back closes the
//     overlay before touching tab history.
//   - When popstate lands on the home entry, we push a fresh trap above
//     so the user can keep pressing back forever and never leave the app.
// ============================================================
function installBackTrap() {
  try {
    history.replaceState({ mwApp: true, kind: "home", tab: TAB }, "");
    history.pushState({ mwApp: true, kind: "trap", tab: TAB }, "");
  } catch {}
}

let SUPPRESS_HISTORY = false;  // set while a popstate-triggered showTab runs

window.addEventListener("popstate", (e) => {
  // 1. If a detail overlay is open, the back gesture closes it. The
  //    history entry just popped was the overlay's own pushed state, so
  //    the URL/state we landed on is the previous in-app state.
  if (MOBILE_DETAIL_OPEN) {
    exitMobileDetail(true);
    return;
  }

  const st = e.state;

  // 2. Landed on one of our app states: sync the tab without re-pushing.
  if (st && st.mwApp) {
    if (st.tab && TAB !== st.tab) {
      SUPPRESS_HISTORY = true;
      try { showTab(st.tab); } finally { SUPPRESS_HISTORY = false; }
    }
    // 3. Re-arm the trap if we just landed on home so the user can press
    //    back again without leaving the page.
    if (st.kind === "home") {
      try { history.pushState({ mwApp: true, kind: "trap", tab: TAB }, ""); } catch {}
    }
    return;
  }

  // 4. No state at all (user backed past our sentinels somehow). Push a
  //    fresh trap to keep them in-app.
  try { history.pushState({ mwApp: true, kind: "trap", tab: TAB }, ""); } catch {}
});

// If the user resizes from phone to desktop while overlay is open, close it.
window.addEventListener('resize', () => {
  if (MOBILE_DETAIL_OPEN && !isMobileViewport()) exitMobileDetail();
});

function cssEscape(s) {
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return String(s).replace(/(["\\])/g, "\\$1");
}

function openModal(name) {
  MODAL = name;
  const host = document.getElementById("mw-modal-host");
  if (host) host.innerHTML = renderModal();
}

function closeModal() {
  MODAL = null;
  const host = document.getElementById("mw-modal-host");
  if (host) host.innerHTML = "";
}

function selectArchive(date) {
  const found = (DATA.briefs || []).find(x => x.date === date);
  if (!found) return;
  ACTIVE_BRIEF = found;
  closeModal();
  TAB = "stocks";
  OPEN_ID = null;
  // Brief changed -> normalize cache invalidates -> pane cache clears in getNormalized
  const b = getNormalized();
  document.getElementById("mw-masthead").innerHTML = renderMasthead(b);
  document.getElementById("mw-mstatus").innerHTML = renderMarketStatus(b.market_status);
  document.getElementById("mw-tabs").innerHTML = renderTabs(TAB);
  document.getElementById("mw-main").innerHTML = paneHtmlFor(TAB);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && MODAL) closeModal();
});

// ============================================================
//  BOOT
// ============================================================
// Drop cache:no-store so the browser uses its HTTP cache + ETag/Last-Modified
// revalidation. GitHub Pages serves both, so returning visitors get an instant
// 304 instead of re-downloading the full briefs.json.
// prices.json (the persistent per-ticker price archive) loads in parallel.
// If it fails or arrives late the chart simply won't render — the page still
// works. Boot doesn't wait for it.
fetch("prices.json")
  .then(r => r.ok ? r.json() : null)
  .then(p => { if (p && p.tickers) PRICES = p; })
  .catch(() => {});

fetch("briefs.json")
  .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
  .then(data => {
    DATA = data;
    const briefs = (data.briefs || []).slice().sort((a, b) => b.date.localeCompare(a.date));
    DATA.briefs = briefs;
    ACTIVE_BRIEF = briefs[0] || null;
    mount();
  })
  .catch(err => {
    document.getElementById("root").innerHTML = `<p class="mw-empty">Could not load briefs: ${escHtml(err)}</p>`;
    console.error(err);
  });

// ============================================================
//  PWA — Install button + service worker registration
//
//  Install-button visibility rules (most-strict to least):
//    1. Already running in standalone (i.e., opened from home screen) -> never show.
//    2. localStorage flag mw_pwa_installed === "1" -> never show. Set on
//       Chrome's appinstalled event, and on iOS when the user has either tapped
//       through the share-sheet hint or marked the install banner as installed.
//    3. localStorage flag mw_pwa_dismissed === "1" -> never show. Set when the
//       user explicitly dismisses the banner with the x close button.
//    4. Chrome/Edge: only after beforeinstallprompt fires (Chrome won't fire
//       this event if the app is already installed, so we rely on it).
//    5. iOS: shown on first visit unless one of the above flags is set.
// ============================================================
let DEFERRED_INSTALL_PROMPT = null;

const PWA_INSTALLED_KEY = "mw_pwa_installed";
const PWA_DISMISSED_KEY = "mw_pwa_dismissed";

function pwaFlag(key) {
  try { return localStorage.getItem(key) === "1"; } catch { return false; }
}
function setPwaFlag(key) {
  try { localStorage.setItem(key, "1"); } catch {}
}

function isStandalone() {
  return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
    || window.navigator.standalone === true;
}

function isIos() {
  const ua = window.navigator.userAgent;
  return /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
}

// Single guard: combine standalone, installed flag, dismissed flag.
function shouldShowInstallButton() {
  if (isStandalone()) {
    setPwaFlag(PWA_INSTALLED_KEY);
    return false;
  }
  if (pwaFlag(PWA_INSTALLED_KEY)) return false;
  if (pwaFlag(PWA_DISMISSED_KEY)) return false;
  return true;
}

// Chrome / Edge / modern Android: captures the install prompt and surfaces a button.
// This event will NOT fire if the browser already considers the app installed.
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  DEFERRED_INSTALL_PROMPT = e;
  if (shouldShowInstallButton()) showInstallButton();
});

window.addEventListener("appinstalled", () => {
  DEFERRED_INSTALL_PROMPT = null;
  setPwaFlag(PWA_INSTALLED_KEY);
  hideInstallButton();
});

function showInstallButton() {
  if (!shouldShowInstallButton()) return;
  let btn = document.getElementById("mw-install-btn");
  if (!btn) {
    btn = document.createElement("button");
    btn.id = "mw-install-btn";
    btn.className = "mw-install-btn";
    btn.type = "button";
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>Install app</span><span class="mw-install-x" role="button" aria-label="Dismiss">&times;</span>`;
    btn.addEventListener("click", (ev) => {
      // Click on the inner x dismisses; click anywhere else triggers install.
      if (ev.target && ev.target.closest && ev.target.closest(".mw-install-x")) {
        ev.stopPropagation();
        setPwaFlag(PWA_DISMISSED_KEY);
        hideInstallButton();
        return;
      }
      triggerInstall();
    });
    document.body.appendChild(btn);
  }
  btn.classList.add("is-visible");
}
function hideInstallButton() {
  const btn = document.getElementById("mw-install-btn");
  if (btn) btn.classList.remove("is-visible");
}

async function triggerInstall() {
  if (DEFERRED_INSTALL_PROMPT) {
    DEFERRED_INSTALL_PROMPT.prompt();
    const { outcome } = await DEFERRED_INSTALL_PROMPT.userChoice;
    if (outcome === "accepted") {
      setPwaFlag(PWA_INSTALLED_KEY);
      hideInstallButton();
    }
    DEFERRED_INSTALL_PROMPT = null;
  } else if (isIos()) {
    // iOS Safari has no programmatic prompt; show inline guidance and treat
    // a click on the iOS hint as "the user has acknowledged how to install" so
    // we don't keep nagging them after they've seen it once.
    showIosInstallHint();
  }
}

function showIosInstallHint() {
  let hint = document.getElementById("mw-ios-hint");
  if (hint) { hint.classList.add("is-visible"); return; }
  hint = document.createElement("div");
  hint.id = "mw-ios-hint";
  hint.className = "mw-ios-hint is-visible";
  hint.innerHTML = `
    <button class="mw-ios-hint-close" aria-label="Close">x</button>
    <p>To install Market Watch as an app, tap the <strong>Share</strong> icon below, then choose <strong>Add to Home Screen</strong>.</p>
    <button class="mw-ios-hint-done" type="button">Already installed</button>`;
  hint.querySelector(".mw-ios-hint-close").addEventListener("click", () => {
    setPwaFlag(PWA_DISMISSED_KEY);
    hint.classList.remove("is-visible");
    hideInstallButton();
  });
  hint.querySelector(".mw-ios-hint-done").addEventListener("click", () => {
    setPwaFlag(PWA_INSTALLED_KEY);
    hint.classList.remove("is-visible");
    hideInstallButton();
  });
  document.body.appendChild(hint);
}

// On iOS, the beforeinstallprompt event never fires; show a manual install button
// on first visit (unless already installed/dismissed/standalone).
window.addEventListener("load", () => {
  if (isIos() && shouldShowInstallButton()) {
    showInstallButton();
  }
});

// Modern browsers can verify installation cross-app via getInstalledRelatedApps()
// (Chrome on Android). Use it as an extra signal to mark installed and hide.
if ("getInstalledRelatedApps" in navigator) {
  navigator.getInstalledRelatedApps().then((apps) => {
    if (Array.isArray(apps) && apps.length > 0) {
      setPwaFlag(PWA_INSTALLED_KEY);
      hideInstallButton();
    }
  }).catch(() => {});
}

// Register the service worker (gives Chrome the green light to install + works offline).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch((err) => {
      console.warn("Service worker registration failed:", err);
    });
  });
}
</script>
</body>
